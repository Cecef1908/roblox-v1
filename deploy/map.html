<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dusthaven — Map Zone 1</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Lora:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0700;font-family:'Lora',Georgia,serif;color:#d4a762;overflow:hidden;height:100vh;display:flex;flex-direction:column}
.map-header{background:linear-gradient(180deg,#1a0e00,#0d0700);border-bottom:2px solid #3a2a15;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:8px}
.map-title{font-family:'Rye',cursive;font-size:1rem;color:#e8c65a;letter-spacing:.05em}
.map-subtitle{font-size:.7rem;color:#8a7044;font-style:italic}
.legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.65rem;color:#b8a070;cursor:pointer;padding:2px 6px;border-radius:3px;border:1px solid transparent;transition:all .2s;user-select:none}
.legend-item:hover{border-color:#3a2a15}
.legend-item.active{border-color:#6b3a1f;background:#1a0e0088}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.map-container{flex:1;position:relative;overflow:auto;background:#0d0700;display:flex;align-items:center;justify-content:center}
.map-wrapper{position:relative;display:inline-block}
.map-wrapper img{display:block;max-width:100vw;max-height:calc(100vh - 50px);object-fit:contain}
.pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:10;transition:transform .15s;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.pin:hover{transform:translate(-50%,-100%) scale(1.3);z-index:20}
.pin-icon{font-size:1.5rem;text-shadow:0 1px 3px rgba(0,0,0,.6);line-height:1}
.pin-label{position:absolute;top:100%;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'Rye',cursive;font-size:.5rem;color:#e8c65a;text-shadow:0 1px 3px rgba(0,0,0,.8),0 0 6px rgba(0,0,0,.6);letter-spacing:.03em;margin-top:1px;pointer-events:none}
.tooltip{display:none;position:fixed;z-index:100;background:linear-gradient(160deg,#1e1408,#0d0700);border:2px solid #6b3a1f;border-radius:4px;padding:12px 14px;max-width:300px;min-width:200px;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.tooltip.visible{display:block}
.tooltip-title{font-family:'Rye',cursive;font-size:.85rem;color:#e8c65a;margin-bottom:4px}
.tooltip-type{font-size:.6rem;color:#b8962e;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.tooltip-desc{font-size:.75rem;color:#b8a070;line-height:1.4}
.tooltip-gameplay{font-size:.7rem;color:#c9a84c;font-style:italic;margin-top:6px;border-top:1px solid #2a1a0a;padding-top:6px}
.zone-label{position:absolute;font-family:'Rye',cursive;color:rgba(232,198,90,.2);letter-spacing:.3em;text-transform:uppercase;pointer-events:none;transform:translate(-50%,-50%);text-shadow:0 0 20px rgba(0,0,0,.5)}
@media(max-width:768px){.map-header{padding:6px 10px}.pin-icon{font-size:1.1rem}.pin-label{font-size:.4rem}}
</style>
</head>
<body>
<div class="map-header">
<div><span class="map-title">DUSTHAVEN — Zone 1</span><span class="map-subtitle">&nbsp; Dead Man's Shallows &bull; 1852</span></div>
<div class="legend">
<div class="legend-item active" onclick="toggleCategory('structure')" data-cat="structure"><span class="legend-dot" style="background:#e8c65a"></span>Bâtiments</div>
<div class="legend-item active" onclick="toggleCategory('pnj')" data-cat="pnj"><span class="legend-dot" style="background:#c9544d"></span>PNJs</div>
<div class="legend-item active" onclick="toggleCategory('spot')" data-cat="spot"><span class="legend-dot" style="background:#f5c542"></span>Orpaillage</div>
<div class="legend-item active" onclick="toggleCategory('fragment')" data-cat="fragment"><span class="legend-dot" style="background:#7bb3ff"></span>Fragments</div>
<div class="legend-item active" onclick="toggleCategory('event')" data-cat="event"><span class="legend-dot" style="background:#9b59b6"></span>Événements</div>
<div class="legend-item active" onclick="toggleCategory('gate')" data-cat="gate"><span class="legend-dot" style="background:#2ecc71"></span>Gates</div>
</div>
</div>
<div class="map-container">
<div class="map-wrapper" id="mapWrapper">
<img src="map-z1.webp" alt="Dusthaven Zone 1" id="mapImg" onload="initPins()">
<div class="zone-label" style="left:48%;top:50%;font-size:1.2rem">DUSTHAVEN</div>
<div class="zone-label" style="left:28%;top:25%;font-size:.75rem">DEAD MAN'S SHALLOWS</div>
<div class="zone-label" style="left:15%;top:10%;font-size:.6rem">MONTAGNE</div>
</div>
</div>
<div class="tooltip" id="tooltip">
<div class="tooltip-title" id="tt-title"></div>
<div class="tooltip-type" id="tt-type"></div>
<div class="tooltip-desc" id="tt-desc"></div>
<div class="tooltip-gameplay" id="tt-gameplay"></div>
</div>
<script>
const PINS=[
{id:'cabane',x:28,y:8,icon:'🏠',label:"Cabane d'Eli",cat:'structure',title:"Cabane du Grand-Père",type:"Spawn Point — Zone 0",desc:"Petite cabane en bois au pied de la montagne. Point de spawn du joueur.",gameplay:"Le joueur prend la batée ici → tutoriel orpaillage dans le ruisseau en contrebas."},
{id:'frag1',x:28.5,y:9.5,icon:'📄',label:'Fragment #1',cat:'fragment',title:"Fragment #1 — La Lettre",type:"Fragment obligatoire — Prologue",desc:"Sous la tasse en étain dans la cabane. Lettre partiellement brûlée d'Eli.",gameplay:"Trouvé APRÈS la 1ère session d'orpaillage, en revenant dans la cabane."},
{id:'spot-tuto',x:32,y:14,icon:'🟡',label:'Spot Tutoriel',cat:'spot',title:"Ruisseau — Spot Tutoriel",type:"Orpaillage — Facile",desc:"Petit ruisseau derrière la cabane. Premier spot d'orpaillage.",gameplay:"Tutoriel : le joueur apprend à utiliser la batée. Premier grain d'or."},
{id:'coyote1',x:33,y:11,icon:'🐺',label:'Coyote',cat:'event',title:"1ère apparition Coyote",type:"Événement — ~min 8",desc:"Coyote assis sur un rocher, observe le joueur. Trace un cercle dans la poussière puis s'éloigne vers Dusthaven.",gameplay:"Micro-récompense émotionnelle. Guide visuel vers le hub."},
{id:'spot1',x:22,y:22,icon:'🟡',label:'Berge facile',cat:'spot',title:"Berge — Spot d'orpaillage",type:"Orpaillage — Facile",desc:"Berge accessible le long de la rivière. Rendement faible mais constant.",gameplay:"Spot débutant. Or commun + quartz."},
{id:'spot2',x:30,y:35,icon:'🟡',label:'Courbe rivière',cat:'spot',title:"Courbe de la Rivière",type:"Orpaillage — Moyen",desc:"Courbe naturelle où le courant dépose les sédiments.",gameplay:"Or commun + pépites moyennes. Nécessite Batée T1."},
{id:'spot3',x:18,y:28,icon:'🟡',label:'Cascade',cat:'spot',title:"Pied de Cascade",type:"Orpaillage — Bon",desc:"Au pied de la cascade. Eau agitée = bon rendement.",gameplay:"Pépites moyennes + rares. Premier gros nugget (~min 16)."},
{id:'spot-secret',x:15,y:25,icon:'⭐',label:'Spot Secret',cat:'spot',title:"Sous la Cascade — Secret",type:"Orpaillage — Excellent (caché)",desc:"Bassin caché derrière la cascade. Or concentré, lumière dorée.",gameplay:"Micro-récompense ~min 32. Pépites rares + gemmes."},
{id:'spot4',x:55,y:65,icon:'🟡',label:'Bassin isolé',cat:'spot',title:"Bassin Isolé",type:"Orpaillage — Moyen",desc:"Bassin en contrebas, nécessite de descendre les berges.",gameplay:"Spot calme, bon rendement."},
{id:'jed',x:44,y:46,icon:'🏪',label:'Magasin Jed',cat:'structure',title:"Magasin de Jed Bramwell",type:"Bâtiment — Commerce",desc:"Bois sombre, toit tôle rouillée, porche avec tonneaux.",gameplay:"Vente équipement, achat or. Donne le carnet d'Eli (rep haute)."},
{id:'jed-pnj',x:44,y:48,icon:'🧓',label:'Jed',cat:'pnj',title:'Jedidiah "Jed" Bramwell',type:"PNJ — Marchand, 58 ans",desc:"Trapu, moustache blanche, lunettes rondes. Grognon mais bienveillant.",gameplay:'"L\'or, ça se mérite, gamin." — Vend, achète, informe.'},
{id:'saloon',x:52,y:45,icon:'🍺',label:"Belle's Saloon",cat:'structure',title:"Belle's Saloon",type:"Bâtiment — Social / Buffs",desc:"Le plus grand bâtiment. 2 étages, portes battantes, balcon.",gameplay:"Potins, buffs temporaires. Le Rattler y apparaît (Acte I tardif)."},
{id:'belle-pnj',x:52,y:47,icon:'💃',label:'Belle',cat:'pnj',title:'Belle Fontaine',type:"PNJ — Gérante Saloon, 30 ans",desc:"Élégante, cheveux auburn. Centre nerveux de Dusthaven.",gameplay:'"Alors, mon petit veinard ?" — Quêtes, potins, buffs.'},
{id:'forge',x:47,y:53,icon:'⚒️',label:'La Forge',cat:'structure',title:"La Forge de Gustave",type:"Bâtiment — Craft",desc:"Bâtiment ouvert, cheminée pierre, enclume. Son permanent du marteau.",gameplay:"Craft outils, Lanterne (Z3), Pickaxe (Z3 Lvl12+), Pendentif."},
{id:'gustave-pnj',x:47,y:55,icon:'🔨',label:'Gustave',cat:'pnj',title:'Gustave Moreau',type:"PNJ — Forgeron, 52 ans",desc:"Homme noir, massif, crâne rasé. Taciturne. 3 coups sur l'enclume = fin de conversation.",gameplay:'"...Bon acier." — Craft, réparations.'},
{id:'sheriff',x:51,y:52,icon:'🏛️',label:'Bureau Sheriff',cat:'structure',title:"Bureau du Sheriff",type:"Bâtiment — Quêtes",desc:"Petit bâtiment, porte unique, étoile ternie.",gameplay:"Quêtes de surveillance (en réalité pour Rattner)."},
{id:'dawson-pnj',x:51,y:54,icon:'🤠',label:'Dawson',cat:'pnj',title:'Sheriff Buck Dawson',type:"PNJ — Autorité corrompue, 45 ans",desc:"Grand, sec, yeux gris, cicatrice. S'approche VERS le joueur.",gameplay:'"Restez en dehors des affaires des autres." — Fausses quêtes.'},
{id:'leaderboard',x:48,y:49,icon:'🏆',label:'Leaderboard',cat:'structure',title:"Panneau Leaderboard",type:"Structure — Classement",desc:"Grand panneau bois au centre de Dusthaven.",gameplay:"Classement orpailleurs. Près du spot Météorite."},
{id:'meteorite',x:48,y:51,icon:'🌠',label:'Météorite',cat:'event',title:"Spot Détecteur — Météorite",type:"Quête secrète — Acte II+",desc:"Centre exact du cratère. Le détecteur bipe ici.",gameplay:"Kaya → Détecteur → Fragment Céleste → Pendentif."},
{id:'frag2',x:25,y:30,icon:'📄',label:'Fragment #2',cat:'fragment',title:"Fragment #2 — Coffre",type:"Fragment obligatoire — Acte I",desc:"Coffre abandonné au bord du ruisseau. 'Under the water, under the stone.'",gameplay:"Coyote réapparaît et guide vers l'inscription murale."},
{id:'frag3',x:12,y:35,icon:'📄',label:'Fragment #3',cat:'fragment',title:"Fragment #3 — Fissure",type:"Fragment optionnel — Quête Kaya",desc:"Caché dans une fissure rocheuse. Explique la trahison de Dawson.",gameplay:"Accessible via quête Kaya uniquement."},
{id:'inscription',x:20,y:32,icon:'🗿',label:'Inscription',cat:'event',title:"Inscription Nahak'a",type:"Événement — ~min 40",desc:"Symboles gravés sur une paroi, cachés par la mousse.",gameplay:"S'enregistre dans le journal. Mystère."},
{id:'panneau',x:35,y:24,icon:'🪧',label:'RATTNER CO.',cat:'event',title:"Panneau RATTNER CO.",type:"Événement — Acte I",desc:"Zone bloquée par des panneaux neufs. Old Pete explique le rachat.",gameplay:"Introduction menace Rattler."},
{id:'old-pete',x:36,y:26,icon:'👴',label:'Old Pete',cat:'pnj',title:'Old Pete',type:"PNJ secondaire — Prospecteur",desc:"Vieux prospecteur dépossédé. Disparaît en Acte II.",gameplay:'"Vendre ou être relocalisé." — Contexte narratif.'},
{id:'nugget',x:20,y:26,icon:'💰',label:'1er Nugget',cat:'event',title:"Premier Gros Nugget",type:"Micro-récompense — ~min 16",desc:"Premier gros nugget d'or. Feedback visuel + son.",gameplay:"Encouragement mécanique."},
{id:'gate-z2',x:10,y:18,icon:'🛶',label:'Kayak → Z2',cat:'gate',title:"Gate Z1 → Z2",type:"Passage — Kayak requis",desc:"Cours d'eau vers Copper Canyon. Kayak nécessaire.",gameplay:"Débloqué après ~45-60 min. Ouvre Z2."}
];
function initPins(){const w=document.getElementById('mapWrapper');PINS.forEach(p=>{const d=document.createElement('div');d.className='pin';d.dataset.cat=p.cat;d.style.left=p.x+'%';d.style.top=p.y+'%';d.innerHTML='<span class="pin-icon">'+p.icon+'</span><span class="pin-label">'+p.label+'</span>';d.addEventListener('mouseenter',e=>showTT(e,p));d.addEventListener('mouseleave',hideTT);d.addEventListener('click',e=>{e.stopPropagation();showTT(e,p)});w.appendChild(d)})}
function showTT(e,p){const t=document.getElementById('tooltip');document.getElementById('tt-title').textContent=p.title;document.getElementById('tt-type').textContent=p.type;document.getElementById('tt-desc').textContent=p.desc;document.getElementById('tt-gameplay').textContent=p.gameplay;t.classList.add('visible');const r=e.target.closest('.pin').getBoundingClientRect();let l=r.left+r.width/2;let tp=r.top-10;if(l+300>window.innerWidth)l=window.innerWidth-310;if(l<10)l=10;if(tp<100)tp=r.bottom+10;t.style.left=l+'px';t.style.top=tp+'px';t.style.transform=tp<r.top?'translateY(-100%)':'none'}
function hideTT(){document.getElementById('tooltip').classList.remove('visible')}
function toggleCategory(c){const items=document.querySelectorAll('.legend-item[data-cat="'+c+'"]');const pins=document.querySelectorAll('.pin[data-cat="'+c+'"]');const a=items[0].classList.contains('active');items.forEach(i=>i.classList.toggle('active'));pins.forEach(p=>p.style.display=a?'none':'block')}
document.addEventListener('click',hideTT);
</script>
</body>
</html>
