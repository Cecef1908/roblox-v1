<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dusthaven — 1896 California Love — Full Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d0d; color: #d4a762; font-family: 'Georgia', serif; overflow: hidden; height: 100vh; }
  
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(180deg, #1a1008 0%, #1a1008dd 80%, transparent 100%);
    padding: 10px 24px 18px; text-align: center;
  }
  #header h1 { font-size: 26px; letter-spacing: 6px; text-transform: uppercase; color: #d4a762; text-shadow: 0 0 20px #d4a76255, 0 2px 4px #000; }
  #header .sub { font-size: 12px; color: #8a7044; letter-spacing: 3px; margin-top: 2px; }
  
  #controls {
    position: fixed; top: 65px; left: 12px; z-index: 100;
    background: #1a1008ee; border: 1px solid #3a2a15; border-radius: 8px;
    padding: 10px; width: 180px; font-size: 11px;
  }
  #controls h3 { color: #d4a762; font-size: 12px; margin-bottom: 6px; border-bottom: 1px solid #3a2a15; padding-bottom: 3px; }
  #controls label { display: flex; align-items: center; gap: 5px; padding: 1px 0; color: #aa8855; cursor: pointer; }
  #controls label:hover { color: #d4a762; }
  #controls input[type=checkbox] { accent-color: #d4a762; width: 13px; height: 13px; }
  .section { margin-top: 8px; }
  
  #right-panel {
    position: fixed; top: 65px; right: 12px; z-index: 100;
    background: #1a1008ee; border: 1px solid #3a2a15; border-radius: 8px;
    padding: 10px; width: 180px; font-size: 11px;
  }
  #right-panel h3 { color: #d4a762; font-size: 12px; margin-bottom: 6px; border-bottom: 1px solid #3a2a15; padding-bottom: 3px; }
  #right-panel input[type=range] { width: 100%; accent-color: #d4a762; }
  #right-panel .val { color: #aa8855; text-align: center; margin-top: 3px; }
  
  #legend {
    position: fixed; bottom: 12px; left: 12px; z-index: 100;
    background: #1a1008ee; border: 1px solid #3a2a15; border-radius: 8px;
    padding: 10px; font-size: 11px; display: flex; gap: 10px; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; color: #aa8855; }
  .legend-dot { width: 14px; height: 14px; border-radius: 2px; border: 1px solid #3a2a1555; }
  
  #stats {
    position: fixed; bottom: 12px; right: 200px; z-index: 100;
    background: #1a1008cc; border: 1px solid #3a2a15; border-radius: 6px;
    padding: 6px 12px; font-size: 10px; color: #8a7044;
  }
  
  #tooltip {
    position: fixed; z-index: 200; pointer-events: none; display: none;
    background: #1a1008f0; border: 1px solid #d4a762; border-radius: 6px;
    padding: 6px 10px; font-size: 11px; color: #d4a762; max-width: 250px;
    box-shadow: 0 4px 12px #000a;
  }
  #tooltip .t-name { font-weight: bold; font-size: 13px; }
  #tooltip .t-detail { color: #aa8855; margin-top: 1px; }
  
  #export-btn {
    position: fixed; bottom: 12px; right: 12px; z-index: 100;
    background: #3a2a15; color: #d4a762; border: 1px solid #d4a762;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: Georgia, serif;
    font-size: 12px; letter-spacing: 1px;
  }
  #export-btn:hover { background: #d4a762; color: #1a1008; }
  
  canvas { display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }

  /* ═══ MOBILE RESPONSIVE ═══ */
  @media (max-width: 768px) {
    #header { padding: 8px 12px 14px; }
    #header h1 { font-size: 18px; letter-spacing: 3px; }
    #header .sub { font-size: 10px; letter-spacing: 1px; }
    
    #controls {
      top: 50px; left: 6px; width: 150px; padding: 8px;
      font-size: 10px; max-height: 60vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #controls h3 { font-size: 11px; }
    
    #right-panel {
      top: 50px; right: 6px; width: 150px; padding: 8px;
      font-size: 10px; max-height: 50vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #right-panel h3 { font-size: 11px; }
    
    #legend {
      left: 6px; right: 6px; bottom: 6px;
      padding: 6px 8px; font-size: 9px; gap: 6px;
      flex-wrap: wrap; justify-content: center;
      max-width: 100%;
    }
    .legend-dot { width: 10px; height: 10px; }
    
    #stats {
      bottom: auto; top: 50px; right: auto; left: 50%;
      transform: translateX(-50%); font-size: 9px;
      padding: 4px 8px; display: none;
    }
    
    #export-btn {
      bottom: auto; top: 50px; right: 6px;
      padding: 4px 10px; font-size: 10px;
    }
  }
  
  @media (max-width: 480px) {
    #header h1 { font-size: 15px; letter-spacing: 2px; }
    #header .sub { font-size: 9px; }
    
    #controls { width: 130px; font-size: 9px; top: 44px; }
    #right-panel { width: 130px; font-size: 9px; top: 44px; }
    
    #legend { font-size: 8px; gap: 4px; padding: 4px 6px; }
    .legend-item { gap: 2px; }
    .legend-dot { width: 8px; height: 8px; }
  }
</style>
</head>

const canvas = document.getElementById('c');

let W, H;

// Camera
let camX = 0, camZ = 0;
let zoom = 0.7;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  requestDraw();
}
window.addEventListener('resize', resize);

function worldToScreen(wx, wz) {
  return [W/2 + (wx - camX) * zoom, H/2 + (wz - camZ) * zoom];
}
function screenToWorld(sx, sy) {
  return [camX + (sx - W/2) / zoom, camZ + (sy - H/2) / zoom];
}

// Pan & zoom
let dragging = false, dragX, dragY;
canvas.addEventListener('mousedown', e => { dragging = true; dragX = e.clientX; dragY = e.clientY; });
window.addEventListener('mousemove', e => {
  if (dragging) {
    camX -= (e.clientX - dragX) / zoom;
    camZ -= (e.clientY - dragY) / zoom;
    dragX = e.clientX; dragY = e.clientY;
    requestDraw();
  }
  updateTooltip(e.clientX, e.clientY);
});
window.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const [wx, wz] = screenToWorld(e.clientX, e.clientY);
  zoom = Math.max(0.15, Math.min(10, zoom * (e.deltaY > 0 ? 0.9 : 1.1)));
  camX = wx - (e.clientX - W/2) / zoom;
  camZ = wz - (e.clientY - H/2) / zoom;
  requestDraw();
}, { passive: false });


// Touch support for mobile
let touchStartX, touchStartY, touchDist;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    dragX = e.touches[0].clientX;
    dragY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchDist = Math.sqrt(dx*dx + dy*dy);
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
    camX -= (tx - dragX) / zoom;
    camZ -= (ty - dragY) / zoom;
    dragX = tx; dragY = ty;
    requestDraw();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const newDist = Math.sqrt(dx*dx + dy*dy);
    if (touchDist > 0) {
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const [wx, wz] = screenToWorld(cx, cy);
      zoom = Math.max(0.15, Math.min(10, zoom * (newDist / touchDist)));
      camX = wx - (cx - W/2) / zoom;
      camZ = wz - (cy - H/2) / zoom;
      requestDraw();
    }
    touchDist = newDist;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) touchDist = 0;
  if (e.touches.length === 0) dragging = false;
});

// Height stats
const minH = 124, maxH = 224, hRange = maxH - minH;

function getMode() { return document.querySelector('input[name=mode]:checked').value; }

// Precompute terrain image
let terrainDirty = true;
let terrainCanvas = document.createElement('canvas');
let terrainCtx = terrainCanvas.getContext('2d');

function buildTerrainImage() {
  const g = TERRAIN.grid;
  const rows = g.length, cols = g[0].length;
  terrainCanvas.width = cols;
  terrainCanvas.height = rows;
  const imgData = terrainCtx.createImageData(cols, rows);
  const d = imgData.data;
  const mode = getMode();
  const eMin = +elevMin.value, eMax = +elevMax.value;
  
  for (let xi = 0; xi < rows; xi++) {
    for (let zi = 0; zi < cols; zi++) {
      const cell = g[xi][zi];
      const h = cell[0], m = cell[1], hasWater = cell[2];
      const idx = (xi * cols + zi) * 4;
      
      if (h < eMin || h > eMax) {
        d[idx] = 13; d[idx+1] = 13; d[idx+2] = 13; d[idx+3] = 255;
        continue;
      }
      
      // Water overlay
      if (hasWater && showWater.checked) {
        // Blend water on top
        const wDepth = Math.min(1, (h - minH) / hRange);
        d[idx] = WATER_COLOR[0] - Math.floor(wDepth * 20);
        d[idx+1] = WATER_COLOR[1] - Math.floor(wDepth * 15);
        d[idx+2] = WATER_COLOR[2] + Math.floor(wDepth * 20);
        d[idx+3] = 255;
        continue;
      }
      
      if (!showTerrain.checked) {
        d[idx] = 13; d[idx+1] = 13; d[idx+2] = 13; d[idx+3] = 255;
        continue;
      }
      
      let r, g2, b;
      if (mode === 'material') {
        const mc = MAT_COLORS[m] || [40, 40, 40];
        // Add height shading
        const shade = 0.6 + 0.4 * ((h - minH) / hRange);
        r = Math.floor(mc[0] * shade);
        g2 = Math.floor(mc[1] * shade);
        b = Math.floor(mc[2] * shade);
      } else if (mode === 'height') {
        const t = (h - minH) / hRange;
        // Green (low) → Yellow → Red (high)
        if (t < 0.5) {
          r = Math.floor(t * 2 * 255);
          g2 = 180;
          b = Math.floor((1 - t * 2) * 80);
        } else {
          r = 255;
          g2 = Math.floor((1 - (t - 0.5) * 2) * 180);
          b = 0;
        }
      } else { // slope
        let slope = 0;
        if (xi > 0 && xi < rows-1 && zi > 0 && zi < cols-1) {
          const hl = g[xi-1][zi][0], hr = g[xi+1][zi][0];
          const hu = g[xi][zi-1][0], hd = g[xi][zi+1][0];
          slope = Math.sqrt((hr-hl)*(hr-hl) + (hd-hu)*(hd-hu)) / 8;
        }
        const t = Math.min(1, slope / 3);
        r = Math.floor(40 + t * 200);
        g2 = Math.floor(120 - t * 80);
        b = Math.floor(40 + t * 40);
      }
      
      d[idx] = r; d[idx+1] = g2; d[idx+2] = b; d[idx+3] = 255;
    }
  }
  terrainCtx.putImageData(imgData, 0, 0);
}

function updateTooltip(mx, my) {
  if (dragging) { tooltip.style.display = 'none'; return; }
  const [wx, wz] = screenToWorld(mx, my);
  
  // Check terrain cell
  const step = TERRAIN.step;
  const xi = Math.floor((wx - TERRAIN.minX) / step);
  const zi = Math.floor((wz - TERRAIN.minZ) / step);
  if (xi >= 0 && xi < TERRAIN.grid.length && zi >= 0 && zi < TERRAIN.grid[0].length) {
    const cell = TERRAIN.grid[xi][zi];
    tooltip.innerHTML = '<div class="t-name">' + cell[1] + (cell[2] ? ' + Water' : '') + '</div>' +
      '<div class="t-detail">Elevation: Y=' + cell[0] + '</div>' +
      '<div class="t-detail">World: (' + Math.floor(wx) + ', ' + Math.floor(wz) + ')</div>';
    tooltip.style.display = 'block';
    tooltip.style.left = (mx + 14) + 'px';
    tooltip.style.top = (my + 14) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
}

let drawRAF = 0;
function requestDraw() { if (!drawRAF) drawRAF = requestAnimationFrame(draw); }

function draw() {
  drawRAF = 0;
  ctx.save();
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  
  // Clear
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);
  
  // Draw terrain
  buildTerrainImage();
  const step = TERRAIN.step;
  const tWidth = TERRAIN.grid.length * step;
  const tHeight = TERRAIN.grid[0].length * step;
  const [sx, sy] = worldToScreen(TERRAIN.minX, TERRAIN.minZ);
  const sw = tWidth * zoom;
  const sh = tHeight * zoom;
  
  ctx.imageSmoothingEnabled = zoom < 2;
  ctx.drawImage(terrainCanvas, sx, sy, sw, sh);
  
  // Grid
  if (showGrid.checked) {
    ctx.strokeStyle = '#ffffff15';
    ctx.lineWidth = 0.5;
    const gridStep = zoom >= 2 ? 20 : zoom >= 0.8 ? 50 : 100;
    const [tlx, tlz] = screenToWorld(0, 0);
    const [brx, brz] = screenToWorld(W, H);
    for (let x = Math.floor(tlx/gridStep)*gridStep; x <= brx; x += gridStep) {
      const [gx] = worldToScreen(x, 0);
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
    }
    for (let z = Math.floor(tlz/gridStep)*gridStep; z <= brz; z += gridStep) {
      const [, gy] = worldToScreen(0, z);
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
    }
  }
  
  // Contour lines
  if (showContours.checked) {
    ctx.strokeStyle = '#ffffff22';
    ctx.lineWidth = 0.8;
    const contourStep = 20;
    const g = TERRAIN.grid;
    const rows = g.length, cols = g[0].length;
    for (let elev = minH; elev <= maxH; elev += contourStep) {
      for (let xi = 0; xi < rows - 1; xi++) {
        for (let zi = 0; zi < cols - 1; zi++) {
          const h00 = g[xi][zi][0], h10 = g[xi+1][zi][0];
          const h01 = g[xi][zi+1][0], h11 = g[xi+1][zi+1][0];
          // Simple contour: draw segment if elevation crosses this contour
          const above = [(h00>=elev), (h10>=elev), (h01>=elev), (h11>=elev)];
          const count = above.filter(Boolean).length;
          if (count > 0 && count < 4) {
            const cx = TERRAIN.minX + (xi + 0.5) * step;
            const cz = TERRAIN.minZ + (zi + 0.5) * step;
            const [px, py] = worldToScreen(cx, cz);
            const s = step * zoom;
            ctx.beginPath();
            ctx.arc(px, py, s * 0.3, 0, Math.PI * 2);
            ctx.stroke();
          }
        }
      }
    }
  }
  
  
  // Labels
  if (showLabels.checked && zoom >= 0.3) {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    // Saloon label
    ctx.font = 'bold ' + Math.max(10, Math.min(16, zoom * 12)) + 'px Georgia';
    ctx.fillStyle = '#d4a762cc';
    const [slx, sly] = worldToScreen(-396, -78);
    ctx.fillText('SALOON', slx, sly);
    
    // Zone labels based on terrain materials - find clusters
    ctx.font = Math.max(8, Math.min(12, zoom * 8)) + 'px Georgia';
    ctx.fillStyle = '#ffffff66';
    
    // Add manual zone labels based on terrain analysis
    const zones = [
      {name: 'River Valley', x: 0, z: 0},
      {name: 'Sand Flats', x: -200, z: -300},
      {name: 'Rocky Ridge', x: 200, z: 200},
      {name: 'Grasslands', x: -300, z: 200},
    ];
    // Detect actual zones from terrain
  }
  
  // Scale bar
  const scaleStuds = zoom > 1 ? 50 : zoom > 0.4 ? 100 : 200;
  const scalePx = scaleStuds * zoom;
  ctx.fillStyle = '#d4a76288';
  ctx.fillRect(W - 30 - scalePx, H - 45, scalePx, 3);
  ctx.font = '10px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText(scaleStuds + ' studs', W - 30 - scalePx/2, H - 50);
  
  ctx.restore();
  document.getElementById('stats').textContent = 
    'Zoom: ' + zoom.toFixed(2) + 'x | Terrain: 1024x1024 studs | ' + 'terrain only';
}

document.getElementById('export-btn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'dusthaven-fullmap.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

resize();
</script>
