<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0d0700;color:#e8d5b0;font-family:'Lora',Georgia,serif}
#topbar{height:52px;background:linear-gradient(180deg,#1a0f04 0%,#0d0700 100%);border-bottom:1px solid #3a2a10;display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0;overflow-x:auto;z-index:100}
#topbar h1{font-family:'Rye',cursive;font-size:16px;color:#e8c65a;white-space:nowrap;margin-right:12px;letter-spacing:1px}
.fbtn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1.5px solid;border-radius:14px;background:transparent;color:#e8d5b0;font-family:'Lora',serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:background .2s,opacity .2s;flex-shrink:0}
.fbtn .dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.fbtn.active{background:rgba(255,255,255,0.08)}
.fbtn.inactive{opacity:0.35}
.fmeta{padding:4px 10px;border:1.5px solid #5a4a2a;border-radius:14px;background:transparent;color:#c9a84c;font-family:'Lora',serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:background .15s;flex-shrink:0}
.fmeta:hover{background:rgba(201,168,76,0.15)}
#main{display:flex;height:calc(100vh - 52px);overflow:hidden}
#map-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:#0a0500}
#map-wrapper{position:relative;display:inline-block;max-width:100%;max-height:100%;line-height:0}
#map-wrapper img{display:block;max-width:100%;max-height:calc(100vh - 52px);object-fit:contain;user-select:none;-webkit-user-drag:none;pointer-events:none}
#grid-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
#pins-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2}
.pin{position:absolute;width:22px;height:22px;border-radius:50%;border:2px solid rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.7);cursor:grab;transform:translate(-50%,-50%);transition:transform .15s ease,box-shadow .15s ease;z-index:3;user-select:none;-webkit-user-select:none}
.pin:hover{transform:translate(-50%,-50%) scale(1.25);box-shadow:0 0 10px 2px rgba(232,198,90,0.5);z-index:10}
.pin.selected{border:2px solid #e8c65a;box-shadow:0 0 12px 3px rgba(232,198,90,0.6);z-index:11}
.pin.dragging{cursor:grabbing;z-index:100;transition:none}
.pin.hidden{display:none}
#panel{width:360px;min-width:360px;background:#110b02;border-left:1px solid #3a2a10;overflow-y:auto;padding:24px 20px;display:none;flex-shrink:0;z-index:50}
#panel.open{display:block}
#panel-close{float:right;background:none;border:none;color:#7a6840;font-size:22px;cursor:pointer;line-height:1;padding:0 4px}
#panel-close:hover{color:#e8c65a}
#panel h2{font-family:'Rye',cursive;color:#e8c65a;font-size:18px;margin-bottom:6px;padding-right:28px}
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;color:#fff;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.coords{font-size:13px;color:#a89060;margin-bottom:16px;font-family:'Lora',serif}
.stitle{font-family:'Rye',cursive;font-size:12px;color:#c9a84c;text-transform:uppercase;letter-spacing:1px;margin:18px 0 6px;border-bottom:1px solid #2a1e0a;padding-bottom:4px}
.sbody{font-size:14px;line-height:1.6;color:#d4c49e}
.quote-block{margin-top:18px;padding:10px 14px;border-left:3px solid #e8c65a;background:rgba(232,198,90,0.04);font-style:italic;color:#c9a84c;font-size:13px;line-height:1.5}
@media(max-width:600px){
#main{flex-direction:column}
#panel{width:100%;min-width:unset;border-left:none;border-top:1px solid #3a2a10;position:fixed;bottom:0;left:0;right:0;height:45vh;max-height:45vh;z-index:200}
#topbar{padding:0 8px;gap:6px}
#topbar h1{font-size:13px;margin-right:8px}
.fbtn{font-size:11px;padding:3px 7px}
.fmeta{font-size:11px;padding:3px 7px}
}
</style>

/* Grid */
var COLS=10,ROWS=10;
function drawGrid(){
  var canvas=document.getElementById('grid-overlay');
  var img=document.getElementById('map-img');
  var w=img.clientWidth,h=img.clientHeight;
  canvas.width=w;canvas.height=h;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  var colW=w/COLS,rowH=h/ROWS;
  ctx.strokeStyle='rgba(232,198,90,0.08)';
  ctx.lineWidth=1;
  for(var i=1;i<COLS;i++){var x=Math.round(colW*i)+0.5;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(var j=1;j<ROWS;j++){var y=Math.round(rowH*j)+0.5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  ctx.font='11px Lora,serif';ctx.fillStyle='rgba(232,198,90,0.25)';
  ctx.textAlign='center';ctx.textBaseline='top';
  for(var i=0;i<COLS;i++) ctx.fillText(String.fromCharCode(65+i),colW*i+colW/2,4);
  ctx.textAlign='left';ctx.textBaseline='middle';
  for(var j=0;j<ROWS;j++) ctx.fillText(String(j+1),4,rowH*j+rowH/2);
}

function pctToGrid(xPct,yPct){
  var col=Math.min(Math.floor(xPct/(100/COLS)),COLS-1);
  var row=Math.min(Math.floor(yPct/(100/ROWS)),ROWS-1);
  return String.fromCharCode(65+col)+(row+1);
}

/* Filters */
var filters={structure:true,pnj:true,spot:true,fragment:true,event:true,gate:true};
function applyFilters(){
  document.querySelectorAll('.pin').forEach(function(el){
    var cat=el.dataset.cat;
    el.classList.toggle('hidden',!filters[cat]);
  });
  document.querySelectorAll('.fbtn').forEach(function(btn){
    var cat=btn.dataset.cat;
    btn.classList.toggle('active',!!filters[cat]);
    btn.classList.toggle('inactive',!filters[cat]);
  });
}

  document.getElementById('p-title').textContent='#'+pin.id+' \u2014 '+pin.name;
  var badge=document.getElementById('p-badge');
  badge.textContent=pin.cat.toUpperCase();
  badge.style.background=CAT_COLORS[pin.cat];
  updateCoords(pin);
  document.getElementById('p-what').textContent=pin.what;
  document.getElementById('p-conditions').textContent=pin.conditions;
  document.getElementById('p-lore').textContent=pin.lore;
  document.getElementById('p-gameplay').textContent=pin.gameplay;
  var quoteEl=document.getElementById('p-quote');
  if(pin.quote){quoteEl.textContent=pin.quote;quoteEl.style.display='block';}
  else{quoteEl.style.display='none';}
  panel.classList.add('open');
}
function updateCoords(pin){
  var grid=pctToGrid(pin.x,pin.y);pin.coord=grid;
  document.getElementById('p-coords').textContent='\uD83D\uDCCD '+grid+' \u2014 ('+pin.x.toFixed(1)+'%, '+pin.y.toFixed(1)+'%)';
}
function closePanel(){
  panel.classList.remove('open');
  if(selectedPin){var el=document.querySelector('.pin[data-id="'+selectedPin.id+'"]');if(el)el.classList.remove('selected');selectedPin=null;}
}
document.getElementById('panel-close').addEventListener('click',closePanel);

/* Create pins */
var pinsLayer=document.getElementById('pins-layer');
PINS.forEach(function(pin){
  var el=document.createElement('div');
  el.className='pin';el.dataset.id=pin.id;el.dataset.cat=pin.cat;
  el.style.left=pin.x+'%';el.style.top=pin.y+'%';
  el.style.background=CAT_COLORS[pin.cat];
  el.textContent=pin.id;
  pinsLayer.appendChild(el);
});

/* Filter buttons */
document.querySelectorAll('.fbtn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var cat=btn.dataset.cat;filters[cat]=!filters[cat];applyFilters();
  });
});
document.getElementById('btn-all').addEventListener('click',function(){
  Object.keys(filters).forEach(function(k){filters[k]=true;});applyFilters();
});
document.getElementById('btn-none').addEventListener('click',function(){
  Object.keys(filters).forEach(function(k){filters[k]=false;});applyFilters();
});
document.getElementById("btn-export").addEventListener("click",function(){var d=PINS.map(function(p){return{id:p.id,name:p.name,x:Math.round(p.x*10)/10,y:Math.round(p.y*10)/10,coord:p.coord,cat:p.cat}});var j=JSON.stringify(d,null,2);if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(j).then(function(){var b=document.getElementById("btn-export");b.textContent="✅ Copié!";setTimeout(function(){b.textContent="📋 Export JSON"},1500)}).catch(function(){var w=window.open("","","width=600,height=400");w.document.write("<pre>"+j+"</pre>")})}else{var w=window.open("","","width=600,height=400");w.document.write("<pre>"+j+"</pre>")}});

/* Drag & Drop + Click */
var isDragging=false,dragEl=null,dragPin=null;
var dragStartX,dragStartY,pinStartX,pinStartY,hasMoved=false;
var DRAG_THRESHOLD=4;
function getClientPos(e){
  if(e.touches&&e.touches.length)return{cx:e.touches[0].clientX,cy:e.touches[0].clientY};
  return{cx:e.clientX,cy:e.clientY};
}
function onPointerDown(e){
  var pinEl=e.target.closest('.pin');if(!pinEl)return;
  var id=parseInt(pinEl.dataset.id);
  var pin=PINS.find(function(p){return p.id===id;});if(!pin)return;
  e.preventDefault();
  var pos=getClientPos(e);
  isDragging=true;dragEl=pinEl;dragPin=pin;
  dragStartX=pos.cx;dragStartY=pos.cy;
  pinStartX=pin.x;pinStartY=pin.y;hasMoved=false;
  pinEl.classList.add('dragging');
}
function onPointerMove(e){
  if(!isDragging||!dragEl)return;e.preventDefault();
  var pos=getClientPos(e);
  var dx=pos.cx-dragStartX,dy=pos.cy-dragStartY;
  if(!hasMoved&&Math.abs(dx)<DRAG_THRESHOLD&&Math.abs(dy)<DRAG_THRESHOLD)return;
  hasMoved=true;
  var wrapper=document.getElementById('map-wrapper');
  var rect=wrapper.getBoundingClientRect();
  var newX=pinStartX+(dx/rect.width)*100;
  var newY=pinStartY+(dy/rect.height)*100;
  dragPin.x=Math.max(0,Math.min(100,newX));
  dragPin.y=Math.max(0,Math.min(100,newY));
  dragEl.style.left=dragPin.x+'%';dragEl.style.top=dragPin.y+'%';
  if(selectedPin&&selectedPin.id===dragPin.id)updateCoords(dragPin);
}
function onPointerUp(e){
  if(!isDragging||!dragEl)return;
  dragEl.classList.remove('dragging');
  if(!hasMoved)openPanel(dragPin);
  else if(selectedPin&&selectedPin.id===dragPin.id)updateCoords(dragPin);
  isDragging=false;dragEl=null;dragPin=null;
}
pinsLayer.addEventListener('mousedown',onPointerDown);
document.addEventListener('mousemove',onPointerMove);
document.addEventListener('mouseup',onPointerUp);
pinsLayer.addEventListener('touchstart',onPointerDown,{passive:false});
document.addEventListener('touchmove',onPointerMove,{passive:false});
document.addEventListener('touchend',onPointerUp);

/* Click background to close panel */
document.getElementById('map-area').addEventListener('click',function(e){
  if(!e.target.closest('.pin')&&!e.target.closest('#panel'))closePanel();
});

/* Init */
var mapImg=document.getElementById('map-img');
function init(){drawGrid();applyFilters();}
if(mapImg.complete)init();else mapImg.addEventListener('load',init);
window.addEventListener('resize',drawGrid);
</script>
</body>
</html>
