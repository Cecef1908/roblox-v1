<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dusthaven — Zone 1 Map</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d0d; font-family: Georgia, serif; color: #aa8855; }

canvas { display: block; width: 100%; height: 100%; cursor: grab; }
canvas.dragging { cursor: grabbing; }

/* ── Header ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 20;
  text-align: center; padding: 10px 16px 8px;
  background: linear-gradient(180deg, #0d0d0dee 0%, #0d0d0daa 80%, transparent 100%);
  pointer-events: none;
}
#header h1 {
  font-family: 'Rye', Georgia, serif; font-size: 28px; color: #d4a762;
  text-shadow: 0 2px 8px #000, 0 0 20px #d4a76233; letter-spacing: 4px; margin-bottom: 2px;
}
#header h2 {
  font-family: Georgia, serif; font-size: 13px; color: #8a6e3a;
  font-weight: normal; letter-spacing: 2px; font-style: italic;
}

/* ── Panel base ── */
.panel {
  position: fixed; z-index: 15;
  background: #1a1008ee; border: 1px solid #3a2a15; border-radius: 8px;
  padding: 12px 14px; backdrop-filter: blur(6px);
  box-shadow: 0 4px 20px #00000088;
}
.panel h3 {
  font-family: 'Rye', Georgia, serif; font-size: 13px; color: #d4a762;
  margin-bottom: 8px; letter-spacing: 1px; border-bottom: 1px solid #3a2a1566;
  padding-bottom: 6px;
}

/* ── Layer Panel (left) ── */
#layerPanel { top: 72px; left: 12px; min-width: 160px; }
#layerPanel label {
  display: flex; align-items: center; gap: 8px; padding: 4px 0;
  cursor: pointer; font-size: 13px; color: #aa8855; transition: color .2s;
  user-select: none;
}
#layerPanel label:hover { color: #d4a762; }
#layerPanel input[type="checkbox"] {
  accent-color: #d4a762; width: 14px; height: 14px; cursor: pointer;
}

/* ── Legend (bottom-left) ── */
#legend { bottom: 14px; left: 12px; min-width: 160px; max-height: 260px; overflow-y: auto; }
#legend .row { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 12px; }
#legend .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #3a2a15; flex-shrink: 0; }

/* ── Stats (bottom-right) ── */
#stats { bottom: 14px; right: 12px; font-size: 12px; min-width: 180px; }
#stats .row { display: flex; justify-content: space-between; padding: 2px 0; }
#stats .lbl { color: #8a6e3a; }
#stats .val { color: #d4a762; font-family: 'Courier New', monospace; }

/* ── Export button ── */
#exportBtn {
  position: fixed; top: 72px; right: 12px; z-index: 15;
  background: #1a1008ee; border: 1px solid #3a2a15; border-radius: 6px;
  color: #d4a762; font-family: 'Rye', Georgia, serif; font-size: 12px;
  padding: 8px 14px; cursor: pointer; letter-spacing: 1px;
  transition: all .2s;
}
#exportBtn:hover { background: #2a1a10; border-color: #d4a762; }

/* ── Mobile hamburger ── */
#menuBtn {
  display: none; position: fixed; top: 10px; left: 10px; z-index: 25;
  background: #1a1008ee; border: 1px solid #3a2a15; border-radius: 6px;
  color: #d4a762; font-size: 22px; width: 38px; height: 38px;
  cursor: pointer; line-height: 38px; text-align: center;
}
@media (max-width: 700px) {
  #menuBtn { display: block; }
  .panel { display: none; }
  .panel.show { display: block; }
  #header h1 { font-size: 20px; }
  #header h2 { font-size: 11px; }
  #exportBtn { top: 10px; right: 54px; padding: 6px 10px; font-size: 11px; }
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3a2a15; border-radius: 3px; }
</style>
</head>

const GRID_SIZE = 32;
const WORLD_SIZE = 1024; // 0..992 + 32

// Build 2D lookup: gridLookup[gx][gz] = cell
const gridLookup = {};
let maxElev = 0;
for (const c of GRID) {
  const gx = c[0] / 32, gz = c[1] / 32;
  if (!gridLookup[gx]) gridLookup[gx] = {};
  gridLookup[gx][gz] = c;
  if (c[3] > maxElev) maxElev = c[3];
}

// Collect water cells
const waterCells = GRID.filter(c => c[2] === 11);

// Build adjacency for water cells and trace chains
function traceWaterPaths() {
  const waterSet = new Set();
  const waterMap = {};
  for (const c of waterCells) {
    const key = `${c[0]},${c[1]}`;
    waterSet.add(key);
    waterMap[key] = c;
  }

  const visited = new Set();
  const chains = [];

  function getNeighbors(x, z) {
    const dirs = [[32,0],[-32,0],[0,32],[0,-32],[32,32],[32,-32],[-32,32],[-32,-32]];
    const result = [];
    for (const [dx, dz] of dirs) {
      const key = `${x+dx},${z+dz}`;
      if (waterSet.has(key)) result.push({x: x+dx, z: z+dz, key});
    }
    return result;
  }

  // BFS to find connected components
  for (const c of waterCells) {
    const startKey = `${c[0]},${c[1]}`;
    if (visited.has(startKey)) continue;

    const component = [];
    const queue = [c];
    visited.add(startKey);

    while (queue.length > 0) {
      const curr = queue.shift();
      component.push({x: curr[0] + 16, z: curr[1] + 16}); // center of cell
      for (const n of getNeighbors(curr[0], curr[1])) {
        if (!visited.has(n.key)) {
          visited.add(n.key);
          queue.push(waterMap[n.key]);
        }
      }
    }

    // Sort component by position to form a reasonable path
    // Use nearest-neighbor ordering
    if (component.length > 1) {
      const ordered = [component[0]];
      const remaining = new Set(component.slice(1).map((_, i) => i + 1));

      while (remaining.size > 0) {
        const last = ordered[ordered.length - 1];
        let bestIdx = -1, bestDist = Infinity;
        for (const idx of remaining) {
          const dx = component[idx].x - last.x;
          const dz = component[idx].z - last.z;
          const d = dx*dx + dz*dz;
          if (d < bestDist) { bestDist = d; bestIdx = idx; }
        }
        ordered.push(component[bestIdx]);
        remaining.delete(bestIdx);
      }
      chains.push(ordered);
    } else {
      chains.push(component);
    }
  }

  return chains;
}

const waterPaths = traceWaterPaths();

    d[i] = 180 + n;     // R
    d[i+1] = 155 + n;   // G
    d[i+2] = 110 + n;   // B
    d[i+3] = 22;         // A - very subtle
  }

  ctx.putImageData(imgData, 0, 0);
  return c;
}

// ═══════════════════════════════════════════════════════════
//  TERRAIN CANVAS (32x32 pixels, upscaled with smoothing)
// ═══════════════════════════════════════════════════════════

function buildTerrainCanvas() {
  const tc = document.createElement('canvas');
  tc.width = 32; tc.height = 32;
  const tCtx = tc.getContext('2d');

  for (const cell of GRID) {
    const gx = cell[0] / 32;
    const gz = cell[1] / 32;
    const matIdx = cell[2];
    const elev = cell[3];
    const [r, g, b] = MATERIAL_COLORS[matIdx];

    // Elevation-based brightness: darker at low, lighter at high
    const elevFactor = 0.65 + 0.35 * (elev / maxElev);

    // For water cells, paint the underlying terrain (sandstone look)
    // so smoothing blends terrain, not water squares
    let fr, fg, fb;
    if (matIdx === 11) {
      // Use sandstone base under water for smooth terrain blending
      const base = MATERIAL_COLORS[8];
      const wf = 0.65 + 0.35 * (elev / maxElev);
      fr = base[0] * wf * 0.85;
      fg = base[1] * wf * 0.85;
      fb = base[2] * wf * 0.85;
    } else {
      fr = r * elevFactor;
      fg = g * elevFactor;
      fb = b * elevFactor;
    }

    tCtx.fillStyle = `rgb(${Math.round(fr)},${Math.round(fg)},${Math.round(fb)})`;
    tCtx.fillRect(gx, gz, 1, 1);
  }

  return tc;
}

const terrainCanvas = buildTerrainCanvas();
const parchmentTexture = generateParchmentTexture(512, 512);

// ═══════════════════════════════════════════════════════════
//  ELEVATION CONTOUR CANVAS (32x32, for subtle hillshading)
// ═══════════════════════════════════════════════════════════

function buildHillshadeCanvas() {
  const hc = document.createElement('canvas');
  hc.width = 32; hc.height = 32;
  const hCtx = hc.getContext('2d');
  const imgData = hCtx.createImageData(32, 32);
  const d = imgData.data;

  // Simple hillshade: compute gradient (dz/dx, dz/dy) and shade
  for (let gx = 0; gx < 32; gx++) {
    for (let gz = 0; gz < 32; gz++) {
      const idx = (gz * 32 + gx) * 4;
      const cell = gridLookup[gx] && gridLookup[gx][gz];
      if (!cell) { d[idx+3] = 0; continue; }

      const e = cell[3];
      const eLeft = (gridLookup[gx-1] && gridLookup[gx-1][gz]) ? gridLookup[gx-1][gz][3] : e;
      const eRight = (gridLookup[gx+1] && gridLookup[gx+1][gz]) ? gridLookup[gx+1][gz][3] : e;
      const eUp = (gridLookup[gx] && gridLookup[gx][gz-1]) ? gridLookup[gx][gz-1][3] : e;
      const eDown = (gridLookup[gx] && gridLookup[gx][gz+1]) ? gridLookup[gx][gz+1][3] : e;

      const dx = (eRight - eLeft) / 2;
      const dz = (eDown - eUp) / 2;

      // Light from top-left
      const shade = (-dx + dz) * 0.8;

      if (shade > 0) {
        // Highlight
        d[idx] = 255; d[idx+1] = 245; d[idx+2] = 220;
        d[idx+3] = Math.min(255, shade * 3);
      } else {
        // Shadow
        d[idx] = 20; d[idx+1] = 15; d[idx+2] = 5;
        d[idx+3] = Math.min(255, Math.abs(shade) * 4);
      }
    }
  }

  hCtx.putImageData(imgData, 0, 0);
  return hc;
}

const hillshadeCanvas = buildHillshadeCanvas();

// ═══════════════════════════════════════════════════════════
//  VIGNETTE BORDER CANVAS
// ═══════════════════════════════════════════════════════════

function buildVignetteCanvas(w, h) {
  const vc = document.createElement('canvas');
  vc.width = w; vc.height = h;
  const vCtx = vc.getContext('2d');

  // Radial gradient from transparent center to dark edges
  const cx = w/2, cy = h/2;
  const r = Math.sqrt(cx*cx + cy*cy);
  const grad = vCtx.createRadialGradient(cx, cy, r * 0.45, cx, cy, r);
  grad.addColorStop(0, 'rgba(13,13,13,0)');
  grad.addColorStop(0.7, 'rgba(13,13,13,0.15)');
  grad.addColorStop(1, 'rgba(13,13,13,0.55)');
  vCtx.fillStyle = grad;
  vCtx.fillRect(0, 0, w, h);

  return vc;
}

// ═══════════════════════════════════════════════════════════
//  MAIN CANVAS + STATE
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');

let W, H;
let zoom = 1;
let panX = 0, panY = 0;
let isDragging = false;
let dragStartX, dragStartY, dragPanX, dragPanY;
let mouseWorldX = 0, mouseWorldZ = 0;

const layers = {
  terrain: true, water: true, trees: true, rocks: true,
  vegetation: true, labels: true, grid: false
};

// Vignette will be rebuilt on resize
let vignetteCanvas = null;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  vignetteCanvas = buildVignetteCanvas(W, H);

  // Center the map initially
  if (panX === 0 && panY === 0) {
    const mapPx = WORLD_SIZE * zoom;
    panX = (W - mapPx) / 2;
    panY = (H - mapPx) / 2;
  }
}

window.addEventListener('resize', () => { resize(); draw(); });
resize();

// ═══════════════════════════════════════════════════════════
//  COORDINATE CONVERSION
// ═══════════════════════════════════════════════════════════

function screenToWorld(sx, sy) {
  return {
    x: (sx - panX) / zoom,
    z: (sy - panY) / zoom
  };
}

function worldToScreen(wx, wz) {
  return {
    x: wx * zoom + panX,
    y: wz * zoom + panY
  };
}

// ═══════════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════════

function draw() {
  ctx.save();
  ctx.clearRect(0, 0, W, H);

  // Dark background
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);

  const mapW = WORLD_SIZE * zoom;
  const mapH = WORLD_SIZE * zoom;

  // ── Terrain layer ──
  if (layers.terrain) {
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(terrainCanvas, panX, panY, mapW, mapH);

    // Hillshade overlay
    ctx.globalAlpha = 0.35;
    ctx.drawImage(hillshadeCanvas, panX, panY, mapW, mapH);
    ctx.globalAlpha = 1;

    // Parchment noise overlay
    ctx.globalAlpha = 0.08;
    ctx.globalCompositeOperation = 'overlay';
    // Tile parchment texture
    const pw = parchmentTexture.width, ph = parchmentTexture.height;
    for (let px = panX; px < panX + mapW; px += pw) {
      for (let py = panY; py < panY + mapH; py += ph) {
        ctx.drawImage(parchmentTexture, px, py, pw, ph);
      }
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;

    // ── Crater overlay (smooth circular gradient) ──
    // Crater center approx at grid (14,14)-(16,16) = world ~480,480
    const craterCX = 480, craterCZ = 480;
    const craterR = 110;
    const scCrater = worldToScreen(craterCX, craterCZ);
    const scrR = craterR * zoom;

    const craterGrad = ctx.createRadialGradient(
      scCrater.x, scCrater.y, scrR * 0.15,
      scCrater.x, scCrater.y, scrR
    );
    craterGrad.addColorStop(0, 'rgba(40, 30, 25, 0.45)');
    craterGrad.addColorStop(0.5, 'rgba(50, 40, 35, 0.3)');
    craterGrad.addColorStop(0.8, 'rgba(60, 50, 40, 0.12)');
    craterGrad.addColorStop(1, 'rgba(60, 50, 40, 0)');
    ctx.fillStyle = craterGrad;
    ctx.beginPath();
    ctx.arc(scCrater.x, scCrater.y, scrR, 0, Math.PI * 2);
    ctx.fill();

    // Crater rim highlight
    ctx.strokeStyle = 'rgba(180, 140, 90, 0.15)';
    ctx.lineWidth = 2 * zoom;
    ctx.beginPath();
    ctx.arc(scCrater.x, scCrater.y, scrR * 0.85, 0, Math.PI * 2);
    ctx.stroke();

    // ── Mountain/Snow region shading ──
    // Snow region center approx (920, 920), radius ~130
    const mtCX = 920, mtCZ = 930;
    const mtR = 140;
    const scMt = worldToScreen(mtCX, mtCZ);
    const scrMtR = mtR * zoom;

    // Bright glow for snow region
    const mtGrad = ctx.createRadialGradient(
      scMt.x, scMt.y, scrMtR * 0.1,
      scMt.x, scMt.y, scrMtR
    );
    mtGrad.addColorStop(0, 'rgba(220, 225, 240, 0.18)');
    mtGrad.addColorStop(0.5, 'rgba(200, 210, 230, 0.1)');
    mtGrad.addColorStop(1, 'rgba(180, 190, 210, 0)');
    ctx.fillStyle = mtGrad;
    ctx.beginPath();
    ctx.arc(scMt.x, scMt.y, scrMtR, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Grid overlay ──
  if (layers.grid) {
    ctx.strokeStyle = 'rgba(212,167,98,0.08)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 32; i++) {
      const pos = i * 32;
      const sc = worldToScreen(pos, 0);
      const sc2 = worldToScreen(pos, WORLD_SIZE);
      ctx.beginPath();
      ctx.moveTo(sc.x, sc.y);
      ctx.lineTo(sc2.x, sc2.y);
      ctx.stroke();

      const sh = worldToScreen(0, pos);
      const sh2 = worldToScreen(WORLD_SIZE, pos);
      ctx.beginPath();
      ctx.moveTo(sh.x, sh.y);
      ctx.lineTo(sh2.x, sh2.y);
      ctx.stroke();
    }
  }

  // ── Water layer (smooth bezier river) ──
  if (layers.water) {
    for (const chain of waterPaths) {
      if (chain.length < 2) {
        // Single water cell: draw as small blue dot
        const sc = worldToScreen(chain[0].x, chain[0].z);
        ctx.fillStyle = 'rgba(60, 130, 200, 0.7)';
        ctx.beginPath();
        ctx.arc(sc.x, sc.y, 4 * zoom, 0, Math.PI * 2);
        ctx.fill();
        continue;
      }

      // Draw thick water path with bezier smoothing
      const riverWidth = 3.5 * zoom;

      // Outer glow
      ctx.save();
      ctx.strokeStyle = 'rgba(40, 100, 180, 0.25)';
      ctx.lineWidth = riverWidth * 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      drawSmoothCurve(ctx, chain);
      ctx.restore();

      // Mid layer
      ctx.save();
      ctx.strokeStyle = 'rgba(55, 125, 200, 0.5)';
      ctx.lineWidth = riverWidth * 1.8;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      drawSmoothCurve(ctx, chain);
      ctx.restore();

      // Core water
      ctx.save();
      ctx.strokeStyle = 'rgba(74, 155, 230, 0.85)';
      ctx.lineWidth = riverWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      drawSmoothCurve(ctx, chain);
      ctx.restore();

      // Specular highlight
      ctx.save();
      ctx.strokeStyle = 'rgba(140, 200, 255, 0.3)';
      ctx.lineWidth = riverWidth * 0.4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.setLineDash([3 * zoom, 6 * zoom]);
      drawSmoothCurve(ctx, chain);
      ctx.setLineDash([]);
      ctx.restore();
    }
  }

  // ── Trees layer ──
  if (layers.trees) {
    for (const t of TREES) {
      const sc = worldToScreen(t.x, t.z);
      drawTree(ctx, sc.x, sc.y, zoom);
    }
  }

  // ── Rocks layer ──
  if (layers.rocks) {
    for (const r of ROCKS) {
      const sc = worldToScreen(r.x, r.z);
      drawRock(ctx, sc.x, sc.y, r.s * 0.3 * zoom);
    }
  }

  // ── Vegetation (cactus) layer ──
  if (layers.vegetation) {
    for (const c of CACTUS) {
      const sc = worldToScreen(c.x, c.z);
      drawCactus(ctx, sc.x, sc.y, zoom);
    }
  }

  // ── Labels layer ──
  if (layers.labels) {
    for (const lb of LABELS) {
      const sc = worldToScreen(lb.x, lb.z);
      drawLabel(ctx, lb, sc.x, sc.y, zoom);
    }
  }

  // ── Map border (ornamental) ──
  if (layers.terrain) {
    const brd = worldToScreen(0, 0);
    ctx.strokeStyle = 'rgba(90, 70, 40, 0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(brd.x, brd.y, mapW, mapH);

    // Inner border
    ctx.strokeStyle = 'rgba(180, 140, 80, 0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(brd.x + 4, brd.y + 4, mapW - 8, mapH - 8);

    // Corner ornaments
    drawCornerOrnaments(ctx, brd.x, brd.y, mapW, mapH);
  }

  // ── Compass Rose ──
  if (layers.labels) {
    const compassSc = worldToScreen(80, 920);
    drawCompassRose(ctx, compassSc.x, compassSc.y, 30 * zoom);
  }

  // ── Scale Bar ──
  if (layers.labels) {
    const scaleSc = worldToScreen(100, 980);
    drawScaleBar(ctx, scaleSc.x, scaleSc.y, zoom);
  }

  // Vignette overlay on top
  if (vignetteCanvas) {
    ctx.drawImage(vignetteCanvas, 0, 0, W, H);
  }

  ctx.restore();
}

// ── Draw smooth bezier curve through points ──
function drawSmoothCurve(ctx, points) {
  if (points.length < 2) return;

  ctx.beginPath();
  const sc0 = worldToScreen(points[0].x, points[0].z);
  ctx.moveTo(sc0.x, sc0.y);

  if (points.length === 2) {
    const sc1 = worldToScreen(points[1].x, points[1].z);
    ctx.lineTo(sc1.x, sc1.y);
  } else {
    // Cardinal spline through all points
    for (let i = 0; i < points.length - 1; i++) {
      const p0 = worldToScreen(
        points[Math.max(0, i-1)].x,
        points[Math.max(0, i-1)].z
      );
      const p1 = worldToScreen(points[i].x, points[i].z);
      const p2 = worldToScreen(points[i+1].x, points[i+1].z);
      const p3 = worldToScreen(
        points[Math.min(points.length-1, i+2)].x,
        points[Math.min(points.length-1, i+2)].z
      );

      const tension = 0.35;
      const cp1x = p1.x + (p2.x - p0.x) * tension;
      const cp1y = p1.y + (p2.y - p0.y) * tension;
      const cp2x = p2.x - (p3.x - p1.x) * tension;
      const cp2y = p2.y - (p3.y - p1.y) * tension;

      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
    }
  }
  ctx.stroke();
}

// ── Draw tree (hand-drawn style) ──
function drawTree(ctx, x, y, z) {
  const s = 5 * z;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(x + s*0.2, y + s*0.8, s*0.5, s*0.2, 0, 0, Math.PI*2);
  ctx.fill();

  // Trunk
  ctx.fillStyle = '#5a3a1a';
  ctx.fillRect(x - s*0.08, y, s*0.16, s*0.5);

  // Foliage (three overlapping circles)
  ctx.fillStyle = 'rgba(55, 95, 35, 0.9)';
  ctx.beginPath();
  ctx.arc(x, y - s*0.1, s*0.4, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = 'rgba(65, 110, 40, 0.85)';
  ctx.beginPath();
  ctx.arc(x - s*0.2, y + s*0.1, s*0.32, 0, Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x + s*0.2, y + s*0.05, s*0.3, 0, Math.PI*2);
  ctx.fill();

  // Highlight dot
  ctx.fillStyle = 'rgba(90, 140, 55, 0.6)';
  ctx.beginPath();
  ctx.arc(x - s*0.08, y - s*0.2, s*0.12, 0, Math.PI*2);
  ctx.fill();
}

// ── Draw rock ──
function drawRock(ctx, x, y, r) {
  if (r < 1) r = 1;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(x + r*0.2, y + r*0.3, r*1.1, r*0.5, 0.1, 0, Math.PI*2);
  ctx.fill();

  // Rock body
  const grad = ctx.createRadialGradient(x - r*0.2, y - r*0.2, 0, x, y, r);
  grad.addColorStop(0, 'rgba(145, 135, 120, 0.9)');
  grad.addColorStop(0.7, 'rgba(110, 100, 90, 0.85)');
  grad.addColorStop(1, 'rgba(80, 75, 65, 0.8)');
  ctx.fillStyle = grad;

  // Irregular shape
  ctx.beginPath();
  ctx.ellipse(x, y, r, r * 0.7, 0.3, 0, Math.PI*2);
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(180, 170, 155, 0.3)';
  ctx.beginPath();
  ctx.ellipse(x - r*0.15, y - r*0.15, r*0.4, r*0.25, 0.5, 0, Math.PI*2);
  ctx.fill();
}

// ── Draw cactus ──
function drawCactus(ctx, x, y, z) {
  const s = 4.5 * z;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.ellipse(x + s*0.15, y + s*0.6, s*0.3, s*0.1, 0, 0, Math.PI*2);
  ctx.fill();

  // Main stem
  ctx.fillStyle = '#3d7a2a';
  ctx.beginPath();
  ctx.roundRect(x - s*0.1, y - s*0.3, s*0.2, s*0.9, s*0.08);
  ctx.fill();

  // Left arm
  ctx.beginPath();
  ctx.roundRect(x - s*0.35, y - s*0.1, s*0.28, s*0.12, s*0.05);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(x - s*0.35, y - s*0.3, s*0.12, s*0.22, s*0.05);
  ctx.fill();

  // Right arm
  ctx.beginPath();
  ctx.roundRect(x + s*0.1, y + s*0.05, s*0.25, s*0.12, s*0.05);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(x + s*0.25, y - s*0.15, s*0.1, s*0.22, s*0.05);
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(80, 160, 50, 0.4)';
  ctx.fillRect(x - s*0.03, y - s*0.25, s*0.06, s*0.7);
}

// ── Draw label ──
function drawLabel(ctx, label, x, y, z) {
  const fontSize = label.size * z * 0.7;
  if (fontSize < 5) return;

  const isItalic = label.style === 'italic';
  const isBold = label.style === 'bold';

  ctx.save();

  // Special: Spawn icon
  if (label.icon === 'star') {
    drawStar(ctx, x, y - fontSize * 1.5, fontSize * 0.7);
    y -= fontSize * 0.3;
  }

  ctx.font = `${isItalic ? 'italic ' : ''}${isBold ? 'bold ' : ''}${fontSize}px Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Text shadow / halo
  ctx.fillStyle = 'rgba(13, 13, 13, 0.7)';
  ctx.fillText(label.text, x + 1, y + 1);
  ctx.fillText(label.text, x - 1, y - 1);
  ctx.fillText(label.text, x + 1, y - 1);
  ctx.fillText(label.text, x - 1, y + 1);

  // Main text
  ctx.fillStyle = '#d4a762';
  ctx.fillText(label.text, x, y);

  // Decorative underline for larger labels
  if (fontSize > 8 && !label.icon) {
    const tw = ctx.measureText(label.text).width;
    ctx.strokeStyle = 'rgba(212, 167, 98, 0.25)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(x - tw/2, y + fontSize * 0.6);
    ctx.lineTo(x + tw/2, y + fontSize * 0.6);
    ctx.stroke();
  }

  ctx.restore();
}

// ── Draw star icon ──
function drawStar(ctx, x, y, r) {
  ctx.save();
  ctx.fillStyle = '#d4a762';
  ctx.shadowColor = 'rgba(212, 167, 98, 0.6)';
  ctx.shadowBlur = r * 2;

  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const px = x + Math.cos(angle) * r;
    const py = y + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ── Corner ornaments ──
function drawCornerOrnaments(ctx, x, y, w, h) {
  const s = 12;
  ctx.strokeStyle = 'rgba(180, 140, 80, 0.3)';
  ctx.lineWidth = 1.5;

  // Top-left
  ctx.beginPath();
  ctx.moveTo(x + s, y); ctx.lineTo(x, y); ctx.lineTo(x, y + s);
  ctx.stroke();

  // Top-right
  ctx.beginPath();
  ctx.moveTo(x + w - s, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + s);
  ctx.stroke();

  // Bottom-left
  ctx.beginPath();
  ctx.moveTo(x + s, y + h); ctx.lineTo(x, y + h); ctx.lineTo(x, y + h - s);
  ctx.stroke();

  // Bottom-right
  ctx.beginPath();
  ctx.moveTo(x + w - s, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - s);
  ctx.stroke();
}

// ── Compass Rose ──
function drawCompassRose(ctx, x, y, r) {
  if (r < 8) return;
  ctx.save();

  // Outer circle
  ctx.strokeStyle = 'rgba(180, 140, 80, 0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.stroke();

  // Inner circle
  ctx.beginPath();
  ctx.arc(x, y, r * 0.15, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(212, 167, 98, 0.5)';
  ctx.fill();

  // Cardinal points
  const dirs = [
    {label: 'N', angle: -Math.PI/2},
    {label: 'E', angle: 0},
    {label: 'S', angle: Math.PI/2},
    {label: 'W', angle: Math.PI}
  ];

  for (const d of dirs) {
    // Pointer triangle
    ctx.fillStyle = d.label === 'N' ? 'rgba(212, 167, 98, 0.7)' : 'rgba(150, 120, 70, 0.4)';
    ctx.beginPath();
    const px = x + Math.cos(d.angle) * r * 0.85;
    const py = y + Math.sin(d.angle) * r * 0.85;
    const perpX = Math.cos(d.angle + Math.PI/2) * r * 0.12;
    const perpY = Math.sin(d.angle + Math.PI/2) * r * 0.12;
    ctx.moveTo(px, py);
    ctx.lineTo(x + perpX, y + perpY);
    ctx.lineTo(x - perpX, y - perpY);
    ctx.closePath();
    ctx.fill();

    // Label
    const lx = x + Math.cos(d.angle) * r * 1.25;
    const ly = y + Math.sin(d.angle) * r * 1.25;
    ctx.font = `${r * 0.3}px Georgia, serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(212, 167, 98, 0.6)';
    ctx.fillText(d.label, lx, ly);
  }

  ctx.restore();
}

// ── Scale bar ──
function drawScaleBar(ctx, x, y, z) {
  const barLen = 200 * z; // 200 studs
  if (barLen < 20) return;

  ctx.save();
  ctx.strokeStyle = 'rgba(180, 140, 80, 0.5)';
  ctx.fillStyle = 'rgba(180, 140, 80, 0.5)';
  ctx.lineWidth = 1.5;

  // Main bar
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + barLen, y);
  ctx.stroke();

  // End ticks
  ctx.beginPath();
  ctx.moveTo(x, y - 4); ctx.lineTo(x, y + 4);
  ctx.moveTo(x + barLen, y - 4); ctx.lineTo(x + barLen, y + 4);
  ctx.stroke();

  // Label
  ctx.font = `${9 * Math.max(z, 0.6)}px Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('200 studs', x + barLen/2, y + 6);

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  INPUT HANDLING
// ═══════════════════════════════════════════════════════════

// Mouse drag
canvas.addEventListener('pointerdown', (e) => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragPanX = panX;
  dragPanY = panY;
  canvas.classList.add('dragging');
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', (e) => {
  // Update world coordinates for stats
  const w = screenToWorld(e.clientX, e.clientY);
  mouseWorldX = w.x;
  mouseWorldZ = w.z;
  updateStats();

  if (!isDragging) return;
  panX = dragPanX + (e.clientX - dragStartX);
  panY = dragPanY + (e.clientY - dragStartY);
  draw();
});

canvas.addEventListener('pointerup', (e) => {
  isDragging = false;
  canvas.classList.remove('dragging');
});

// Zoom with scroll
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const oldZoom = zoom;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.2, Math.min(8, zoom * delta));

  // Zoom toward cursor
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  panX = mx - (mx - panX) * (zoom / oldZoom);
  panY = my - (my - panY) * (zoom / oldZoom);

  draw();
  updateStats();
}, { passive: false });

// Touch: pinch zoom
let lastTouchDist = 0;
let lastTouchCenter = null;

canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
    lastTouchCenter = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const center = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };

    if (lastTouchDist > 0) {
      const oldZoom = zoom;
      zoom = Math.max(0.2, Math.min(8, zoom * (dist / lastTouchDist)));

      panX = center.x - (center.x - panX) * (zoom / oldZoom);
      panY = center.y - (center.y - panY) * (zoom / oldZoom);

      // Pan with center movement
      if (lastTouchCenter) {
        panX += center.x - lastTouchCenter.x;
        panY += center.y - lastTouchCenter.y;
      }

      draw();
    }

    lastTouchDist = dist;
    lastTouchCenter = center;
  }
}, { passive: false });

canvas.addEventListener('touchend', () => {
  lastTouchDist = 0;
  lastTouchCenter = null;
});

// ═══════════════════════════════════════════════════════════
//  STATS UPDATE
// ═══════════════════════════════════════════════════════════

function updateStats() {
  const wx = Math.round(mouseWorldX);
  const wz = Math.round(mouseWorldZ);
  document.getElementById('sPos').textContent = `${wx}, ${wz}`;
  document.getElementById('sZoom').textContent = zoom.toFixed(2) + 'x';

  // Find cell
  const gx = Math.floor(mouseWorldX / 32);
  const gz = Math.floor(mouseWorldZ / 32);
  const cell = gridLookup[gx] && gridLookup[gx][gz];

  if (cell && wx >= 0 && wz >= 0 && wx <= 1024 && wz <= 1024) {
    document.getElementById('sMat').textContent = MATERIAL_NAMES[cell[2]] || '?';
    document.getElementById('sElev').textContent = cell[3] + '';
  } else {
    document.getElementById('sMat').textContent = '\u2014';
    document.getElementById('sElev').textContent = '\u2014';
  }
}

// ═══════════════════════════════════════════════════════════
//  EXPORT PNG
// ═══════════════════════════════════════════════════════════

function exportPNG() {
  // Create high-res export canvas
  const exportSize = 2048;
  const ec = document.createElement('canvas');
  ec.width = exportSize;
  ec.height = exportSize;
  const ectx = ec.getContext('2d');

  // Fill background
  ectx.fillStyle = '#0d0d0d';
  ectx.fillRect(0, 0, exportSize, exportSize);

  // Draw terrain scaled
  ectx.imageSmoothingEnabled = true;
  ectx.imageSmoothingQuality = 'high';
  const margin = 80;
  const mapSize = exportSize - margin * 2;
  ectx.drawImage(terrainCanvas, margin, margin, mapSize, mapSize);

  // Hillshade
  ectx.globalAlpha = 0.35;
  ectx.drawImage(hillshadeCanvas, margin, margin, mapSize, mapSize);
  ectx.globalAlpha = 1;

  // Title
  ectx.font = '48px Rye, Georgia, serif';
  ectx.textAlign = 'center';
  ectx.fillStyle = '#d4a762';
  ectx.fillText('DUSTHAVEN', exportSize / 2, 50);
  ectx.font = 'italic 20px Georgia, serif';
  ectx.fillStyle = '#8a6e3a';
  ectx.fillText('Zone 1 \u2014 Perdition Creek Valley', exportSize / 2, 75);

  // Download
  const link = document.createElement('a');
  link.download = 'dusthaven-map.png';
  link.href = ec.toDataURL('image/png');
  link.click();
}

// ═══════════════════════════════════════════════════════════
//  INITIAL DRAW
// ═══════════════════════════════════════════════════════════

// Center map
const initialMapPx = WORLD_SIZE * zoom;
panX = (W - initialMapPx) / 2;
panY = (H - initialMapPx) / 2;
draw();

</script>
