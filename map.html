<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dusthaven — Map Interactive</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0700;font-family:'Lora',Georgia,serif;color:#d4a762;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* Top bar */
.topbar{background:linear-gradient(180deg,#1a0e00,#0d0700);border-bottom:2px solid #3a2a15;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:6px;z-index:50}
.topbar-title{font-family:'Rye',cursive;font-size:.95rem;color:#e8c65a;letter-spacing:.04em}
.topbar-sub{font-size:.65rem;color:#8a7044;font-style:italic;margin-left:8px}
.legend{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.leg-btn{display:flex;align-items:center;gap:3px;font-size:.6rem;color:#b8a070;cursor:pointer;padding:2px 6px;border-radius:3px;border:1px solid #2a1a0a;transition:all .2s;user-select:none}
.leg-btn:hover{border-color:#6b3a1f}
.leg-btn.on{border-color:#6b3a1f;background:#1a0e0088;color:#d4a762}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.export-btn{font-family:'Rye',cursive;font-size:.55rem;padding:3px 10px;background:#1a0e00;border:1px solid #6b3a1f;color:#b8962e;border-radius:3px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase}
.export-btn:hover{background:#2a1800;color:#e8c65a}

/* Main layout */
.main{flex:1;display:flex;overflow:hidden}

/* Map area */
.map-area{flex:1;position:relative;overflow:hidden;background:#0d0700;display:flex;align-items:center;justify-content:center}
.map-wrap{position:relative;display:inline-block;line-height:0}
.map-wrap img{display:block;max-width:100%;max-height:calc(100vh - 44px);object-fit:contain;user-select:none;-webkit-user-drag:none}

/* Grid overlay */
.grid-line-v,.grid-line-h{position:absolute;pointer-events:none}
.grid-line-v{top:0;bottom:0;width:1px;background:rgba(232,198,90,.08)}
.grid-line-h{left:0;right:0;height:1px;background:rgba(232,198,90,.08)}
.grid-label{position:absolute;font-size:10px;color:rgba(232,198,90,.25);font-family:'Lora',serif;pointer-events:none}

/* Pins */
.pin{position:absolute;width:20px;height:20px;border-radius:50%;cursor:grab;z-index:10;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#000;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,.7);box-shadow:0 1px 4px rgba(0,0,0,.5);transition:box-shadow .15s,transform .1s}
.pin:hover{box-shadow:0 0 12px rgba(232,198,90,.4);transform:translate(-50%,-50%) scale(1.2);z-index:20}
.pin.dragging{cursor:grabbing;z-index:30;box-shadow:0 0 16px rgba(232,198,90,.6)}
.pin.selected{border-color:#e8c65a;box-shadow:0 0 14px rgba(232,198,90,.5);z-index:25}

/* Side panel */
.panel{width:360px;background:#0d0700;border-left:2px solid #3a2a15;overflow-y:auto;flex-shrink:0;padding:0;transition:width .2s}
.panel.collapsed{width:0;padding:0;border:none;overflow:hidden}
.panel-empty{padding:40px 20px;text-align:center;color:#5c4209;font-style:italic;font-size:.85rem}
.panel-content{padding:16px}
.panel-cat{font-size:.55rem;text-transform:uppercase;letter-spacing:.15em;padding:2px 8px;border-radius:2px;display:inline-block;margin-bottom:8px}
.panel-name{font-family:'Rye',cursive;font-size:1.1rem;color:#e8c65a;margin-bottom:4px}
.panel-coord{font-size:.7rem;color:#b8962e;margin-bottom:12px;font-style:italic}
.panel-section{margin-bottom:14px}
.panel-section-title{font-family:'Rye',cursive;font-size:.7rem;color:#8a7044;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;border-bottom:1px solid #2a1a0a;padding-bottom:3px}
.panel-text{font-size:.8rem;color:#b8a070;line-height:1.5}
.panel-quote{font-size:.78rem;color:#c9a84c;font-style:italic;border-left:2px solid #3a2a15;padding-left:10px;margin-top:6px}
.panel-divider{height:1px;background:linear-gradient(90deg,transparent,#3a2a15,transparent);margin:16px 0}

@media(max-width:900px){.panel{width:280px}.pin{width:16px;height:16px;font-size:7px}}
@media(max-width:600px){.panel{position:fixed;bottom:0;left:0;right:0;width:100%;height:45vh;border-left:none;border-top:2px solid #3a2a15;z-index:40}.panel.collapsed{height:0}}
</style>
</head>

let catVisible = {};
let selectedPin = null;
let dragPin = null;
let dragOffset = {x:0,y:0};

function init() {
  const wrap = document.getElementById('mapWrap');
  const img = document.getElementById('mapImg');

  // Build legend
  const legEl = document.getElementById('legend');
  for (const [key, val] of Object.entries(CATS)) {
    catVisible[key] = true;
    const btn = document.createElement('div');
    btn.className = 'leg-btn on';
    btn.dataset.cat = key;
    btn.innerHTML = '<span class="leg-dot" style="background:'+val.color+'"></span>'+val.name;
    btn.onclick = () => toggleCat(key, btn);
    legEl.appendChild(btn);
  }

  // Build grid
  for (let i = 1; i < 10; i++) {
    const vl = document.createElement('div');
    vl.className = 'grid-line-v';
    vl.style.left = (i*10)+'%';
    wrap.appendChild(vl);
    const hl = document.createElement('div');
    hl.className = 'grid-line-h';
    hl.style.top = (i*10)+'%';
    wrap.appendChild(hl);
  }
  // Grid labels
  for (let i = 0; i < 10; i++) {
    const cl = document.createElement('div');
    cl.className = 'grid-label';
    cl.style.left = (i*10+5)+'%';
    cl.style.top = '1px';
    cl.textContent = String.fromCharCode(65+i);
    wrap.appendChild(cl);
    const rl = document.createElement('div');
    rl.className = 'grid-label';
    rl.style.top = (i*10+5)+'%';
    rl.style.left = '2px';
    rl.textContent = String(i+1);
    wrap.appendChild(rl);
  }

  // Build pins
  PINS.forEach(p => {
    const el = document.createElement('div');
    el.className = 'pin';
    el.id = 'pin-'+p.id;
    el.dataset.id = p.id;
    el.dataset.cat = p.cat;
    el.style.left = p.x+'%';
    el.style.top = p.y+'%';
    el.style.background = CATS[p.cat].color;
    el.textContent = p.id;
    el.title = p.name;

    el.addEventListener('mousedown', e => startDrag(e, p, el));
    el.addEventListener('click', e => { e.stopPropagation(); selectPin(p, el); });
    // Touch
    el.addEventListener('touchstart', e => startDragTouch(e, p, el), {passive:false});

    wrap.appendChild(el);
  });

  // Map click = deselect
  wrap.addEventListener('click', () => deselectPin());

  // Mouse move/up on document for dragging
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchmove', onDragTouch, {passive:false});
  document.addEventListener('touchend', endDragTouch);

  // Show panel
  document.getElementById('panel').classList.remove('collapsed');
}

function toggleCat(cat, btn) {
  catVisible[cat] = !catVisible[cat];
  btn.classList.toggle('on');
  document.querySelectorAll('.pin[data-cat="'+cat+'"]').forEach(el => {
    el.style.display = catVisible[cat] ? 'flex' : 'none';
  });
}

function selectPin(p, el) {
  document.querySelectorAll('.pin.selected').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedPin = p;
  showPanel(p);
}

function deselectPin() {
  document.querySelectorAll('.pin.selected').forEach(e => e.classList.remove('selected'));
  selectedPin = null;
  document.getElementById('panelEmpty').style.display = 'block';
  document.getElementById('panelContent').style.display = 'none';
}

function showPanel(p) {
  const cat = CATS[p.cat];
  const pe = document.getElementById('panelEmpty');
  const pc = document.getElementById('panelContent');
  pe.style.display = 'none';
  pc.style.display = 'block';

  let html = '';
  html += '<div class="panel-cat" style="background:'+cat.color+'22;color:'+cat.color+';border:1px solid '+cat.color+'44">'+p.icon+' '+cat.name+'</div>';
  html += '<div class="panel-name">'+p.id+'. '+p.name+'</div>';
  html += '<div class="panel-coord">📍 '+p.coord+' — Position: '+Math.round(p.x)+'%, '+Math.round(p.y)+'%</div>';

  html += '<div class="panel-section"><div class="panel-section-title">Ce que c\'est</div><div class="panel-text">'+p.what+'</div></div>';
  html += '<div class="panel-section"><div class="panel-section-title">Conditions d\'accès</div><div class="panel-text">'+p.conditions+'</div></div>';
  html += '<div class="panel-section"><div class="panel-section-title">Lore & Contexte</div><div class="panel-text">'+p.lore+'</div></div>';
  html += '<div class="panel-section"><div class="panel-section-title">Gameplay</div><div class="panel-text">'+p.gameplay+'</div></div>';

  if (p.quote) {
    html += '<div class="panel-quote">'+p.quote+'</div>';
  }

  pc.innerHTML = html;
}

// DRAG
function startDrag(e, p, el) {
  e.preventDefault();
  dragPin = { p, el };
  el.classList.add('dragging');
  const rect = document.getElementById('mapWrap').getBoundingClientRect();
  dragOffset.x = e.clientX - (p.x/100 * rect.width + rect.left);
  dragOffset.y = e.clientY - (p.y/100 * rect.height + rect.top);
}

function onDrag(e) {
  if (!dragPin) return;
  e.preventDefault();
  const rect = document.getElementById('mapWrap').getBoundingClientRect();
  let nx = ((e.clientX - dragOffset.x - rect.left) / rect.width) * 100;
  let ny = ((e.clientY - dragOffset.y - rect.top) / rect.height) * 100;
  nx = Math.max(0, Math.min(100, nx));
  ny = Math.max(0, Math.min(100, ny));
  dragPin.el.style.left = nx + '%';
  dragPin.el.style.top = ny + '%';
  dragPin.p.x = nx;
  dragPin.p.y = ny;
  // Update coord display
  const col = String.fromCharCode(65 + Math.floor(nx/10));
  const row = Math.floor(ny/10) + 1;
  dragPin.p.coord = col + row;
  if (selectedPin && selectedPin.id === dragPin.p.id) showPanel(dragPin.p);
}

function endDrag() {
  if (!dragPin) return;
  dragPin.el.classList.remove('dragging');
  selectPin(dragPin.p, dragPin.el);
  dragPin = null;
}

// Touch support
function startDragTouch(e, p, el) {
  e.preventDefault();
  const t = e.touches[0];
  dragPin = { p, el };
  el.classList.add('dragging');
  const rect = document.getElementById('mapWrap').getBoundingClientRect();
  dragOffset.x = t.clientX - (p.x/100 * rect.width + rect.left);
  dragOffset.y = t.clientY - (p.y/100 * rect.height + rect.top);
}
function onDragTouch(e) {
  if (!dragPin) return;
  e.preventDefault();
  const t = e.touches[0];
  const rect = document.getElementById('mapWrap').getBoundingClientRect();
  let nx = ((t.clientX - dragOffset.x - rect.left) / rect.width) * 100;
  let ny = ((t.clientY - dragOffset.y - rect.top) / rect.height) * 100;
  nx = Math.max(0, Math.min(100, nx));
  ny = Math.max(0, Math.min(100, ny));
  dragPin.el.style.left = nx + '%';
  dragPin.el.style.top = ny + '%';
  dragPin.p.x = nx;
  dragPin.p.y = ny;
  const col = String.fromCharCode(65 + Math.floor(nx/10));
  const row = Math.floor(ny/10) + 1;
  dragPin.p.coord = col + row;
  if (selectedPin && selectedPin.id === dragPin.p.id) showPanel(dragPin.p);
}
function endDragTouch() {
  if (!dragPin) return;
  dragPin.el.classList.remove('dragging');
  selectPin(dragPin.p, dragPin.el);
  dragPin = null;
}

function exportCoords() {
  const data = PINS.map(p => ({id:p.id, name:p.name, x:Math.round(p.x*10)/10, y:Math.round(p.y*10)/10, coord:p.coord, cat:p.cat}));
  const json = JSON.stringify(data, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    alert('Coordonnées copiées dans le presse-papier !');
  }).catch(() => {
    const w = window.open('','','width=600,height=400');
    w.document.write('<pre>'+json+'</pre>');
  });
}
</script>
