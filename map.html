<html lang="en">
<head>
<meta charset="UTF-8">

<title>Dusthaven — Zone 1 Map</title>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d0d; font-family: Georgia, serif; color: #aa8855; }

canvas { display: block; width: 100%; height: 100%; cursor: grab; }
canvas.dragging { cursor: grabbing; }

/* ── Header ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 20;
  text-align: center; padding: 10px 16px 8px;
  background: linear-gradient(180deg, #0d0d0dee 0%, #0d0d0daa 80%, transparent 100%);
  pointer-events: none;
}
#header h1 {
  font-family: 'Rye', Georgia, serif; font-size: 28px; color: #d4a762;
  text-shadow: 0 2px 8px #000, 0 0 20px #d4a76233; letter-spacing: 4px; margin-bottom: 2px;
}
#header h2 {
  font-family: Georgia, serif; font-size: 13px; color: #8a6e3a;
  font-weight: normal; letter-spacing: 2px; font-style: italic;
}

/* ── Panel base ── */
.panel {
  position: fixed; z-index: 15;
  background: #1a1008ee; border: 1px solid #3a2a15; border-radius: 8px;
  padding: 12px 14px; backdrop-filter: blur(6px);
  box-shadow: 0 4px 20px #00000088;
}
.panel h3 {
  font-family: 'Rye', Georgia, serif; font-size: 13px; color: #d4a762;
  margin-bottom: 8px; letter-spacing: 1px; border-bottom: 1px solid #3a2a1566;
  padding-bottom: 6px;
}

/* ── Layer Panel (left) ── */
#layerPanel { top: 72px; left: 12px; min-width: 160px; }
#layerPanel label {
  display: flex; align-items: center; gap: 8px; padding: 4px 0;
  cursor: pointer; font-size: 13px; color: #aa8855; transition: color .2s;
  user-select: none;
}
#layerPanel label:hover { color: #d4a762; }
#layerPanel input[type="checkbox"] {
  appearance: none; -webkit-appearance: none; width: 16px; height: 16px;
  border: 1px solid #5a4a30; border-radius: 3px; background: #0d0d0d;
  cursor: pointer; position: relative; flex-shrink: 0;
}
#layerPanel input[type="checkbox"]:checked {
  background: #d4a762; border-color: #d4a762;
}
#layerPanel input[type="checkbox"]:checked::after {
  content: ''; position: absolute; top: 2px; left: 5px;
  width: 4px; height: 8px; border: solid #0d0d0d; border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

/* ── Legend (bottom-left) ── */
#legend { bottom: 12px; left: 12px; }
#legend .row { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 12px; }
#legend .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #3a2a15; flex-shrink: 0; }

/* ── Stats (bottom-right) ── */
#stats { bottom: 12px; right: 12px; font-size: 12px; min-width: 180px; }
#stats .row { display: flex; justify-content: space-between; padding: 2px 0; }
#stats .label { color: #8a6e3a; }
#stats .value { color: #d4a762; font-family: 'Courier New', monospace; }

/* ── Export button ── */
#exportBtn {
  position: fixed; bottom: 160px; right: 12px; z-index: 15;
  background: #1a1008ee; border: 1px solid #3a2a15; border-radius: 8px;
  color: #d4a762; padding: 8px 14px; font-family: Georgia, serif; font-size: 13px;
  cursor: pointer; transition: all .2s; backdrop-filter: blur(6px);
  box-shadow: 0 4px 20px #00000088;
}
#exportBtn:hover { background: #2a1a10ee; border-color: #d4a762; }

/* ── Hamburger (mobile) ── */
#hamburger {
  display: none; position: fixed; top: 68px; left: 12px; z-index: 25;
  background: #1a1008ee; border: 1px solid #3a2a15; border-radius: 6px;
  color: #d4a762; width: 36px; height: 36px; font-size: 20px; line-height: 36px;
  text-align: center; cursor: pointer; backdrop-filter: blur(6px);
}

/* ── Mobile ── */
@media (max-width: 700px) {
  #header h1 { font-size: 20px; letter-spacing: 2px; }
  #header h2 { font-size: 11px; }
  #layerPanel, #legend { display: none; }
  #layerPanel.open, #legend.open { display: block; }
  #hamburger { display: block; }
  #stats { font-size: 11px; min-width: 150px; }
}
</style>

      // Darken low, brighten high
      var shade = 0.7 + elevNorm * 0.6;
      var sr = Math.min(255, Math.round(r * shade));
      var sg = Math.min(255, Math.round(g * shade));
      var sb = Math.min(255, Math.round(b * shade));

      tc.fillStyle = 'rgb(' + sr + ',' + sg + ',' + sb + ')';
      tc.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
    }
  }
  terrainDirty = false;
}

// =====================================================================
//  HELPERS
// =====================================================================

function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1, 3), 16),
    g: parseInt(hex.slice(3, 5), 16),
    b: parseInt(hex.slice(5, 7), 16)
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - camX) / zoom,
    z: (sy - camY) / zoom
  };
}

function worldToScreen(wx, wz) {
  return {
    x: wx * zoom + camX,
    y: wz * zoom + camY
  };
}

function getCellAt(wx, wz) {
  var col = Math.floor(wx / CELL_SIZE);
  var row = Math.floor(wz / CELL_SIZE);
  if (col < 0 || col >= GRID_SIZE || row < 0 || row >= GRID_SIZE) return null;
  return gridCells[col] ? gridCells[col][row] : null;
}

// =====================================================================
//  DRAW STAR
// =====================================================================

function drawStar(cx, cy, spikes, outerR, innerR, context) {
  var tctx = context || ctx;
  var rot = Math.PI / 2 * 3;
  var step = Math.PI / spikes;
  tctx.beginPath();
  tctx.moveTo(cx, cy - outerR);
  for (var si = 0; si < spikes; si++) {
    tctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    tctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  tctx.lineTo(cx, cy - outerR);
  tctx.closePath();
  tctx.fillStyle = '#FFD700';
  tctx.fill();
  tctx.strokeStyle = '#AA8800';
  tctx.lineWidth = 0.8;
  tctx.stroke();
}

// =====================================================================
//  DRAW ELEMENTS
// =====================================================================

function drawRocks(tctx) {
  for (var ri = 0; ri < ROCKS.length; ri++) {
    var r = ROCKS[ri];
    var radius = r.s * 0.5;
    tctx.beginPath();
    tctx.arc(r.x, r.z, radius, 0, Math.PI * 2);
    tctx.fillStyle = 'rgba(107,107,107,0.7)';
    tctx.fill();
    tctx.strokeStyle = 'rgba(80,80,80,0.9)';
    tctx.lineWidth = 1;
    tctx.stroke();
  }
}

function drawTrees(tctx) {
  for (var ti = 0; ti < TREES.length; ti++) {
    var t = TREES[ti];
    var s = 8;
    // trunk
    tctx.fillStyle = '#5C3A1E';
    tctx.fillRect(t.x - 1.5, t.z + 2, 3, 5);
    // canopy (triangle)
    tctx.beginPath();
    tctx.moveTo(t.x, t.z - s);
    tctx.lineTo(t.x - s * 0.7, t.z + 3);
    tctx.lineTo(t.x + s * 0.7, t.z + 3);
    tctx.closePath();
    tctx.fillStyle = '#2D5A1E';
    tctx.fill();
    tctx.strokeStyle = '#1A3A10';
    tctx.lineWidth = 0.5;
    tctx.stroke();
  }
}

function drawVegetation(tctx) {
  var vi;
  // Cacti (green diamonds)
  for (vi = 0; vi < CACTI.length; vi++) {
    var c = CACTI[vi];
    var s = 4;
    tctx.beginPath();
    tctx.moveTo(c.x, c.z - s);
    tctx.lineTo(c.x + s * 0.6, c.z);
    tctx.lineTo(c.x, c.z + s);
    tctx.lineTo(c.x - s * 0.6, c.z);
    tctx.closePath();
    tctx.fillStyle = '#4A8A30';
    tctx.fill();
    tctx.strokeStyle = '#2A5A15';
    tctx.lineWidth = 0.5;
    tctx.stroke();
  }
  // Dry grass (tiny yellowish dots)
  for (vi = 0; vi < DRYGRASS.length; vi++) {
    var d = DRYGRASS[vi];
    tctx.beginPath();
    tctx.arc(d.x, d.z, 2, 0, Math.PI * 2);
    tctx.fillStyle = '#A89050';
    tctx.fill();
  }
  // Tumbleweeds (small brown circles)
  for (vi = 0; vi < TUMBLEWEEDS.length; vi++) {
    var tw = TUMBLEWEEDS[vi];
    tctx.beginPath();
    tctx.arc(tw.x, tw.z, 4, 0, Math.PI * 2);
    tctx.fillStyle = 'rgba(139,110,70,0.7)';
    tctx.fill();
    tctx.strokeStyle = '#6B5530';
    tctx.lineWidth = 0.8;
    tctx.stroke();
  }
}

function drawLabels(tctx) {
  tctx.textAlign = 'center';
  tctx.textBaseline = 'middle';
  for (var li = 0; li < LABELS.length; li++) {
    var lb = LABELS[li];
    var fs = lb.size || 13;
    tctx.font = 'bold ' + fs + 'px Georgia, serif';

    // Shadow
    tctx.fillStyle = 'rgba(0,0,0,0.7)';
    tctx.fillText(lb.text, lb.x + 1, lb.z + 1);

    // Text
    tctx.fillStyle = '#d4a762';
    tctx.fillText(lb.text, lb.x, lb.z);

    // Star icon for spawn
    if (lb.icon === 'star') {
      drawStar(SPAWN.x, SPAWN.z - 18, 5, 7, 3, tctx);
    }
  }
}

// =====================================================================
//  MAIN DRAW LOOP
// =====================================================================

function drawFrame(time) {
  animFrame++;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(camX, camY);
  ctx.scale(zoom, zoom);

  // -- Terrain --
  if (layers.terrain) {
    if (terrainDirty) buildTerrainCache();
    ctx.drawImage(terrainCache, 0, 0);
  }

  // -- Water shimmer --
  if (layers.water) {
    for (var col = 0; col < GRID_SIZE; col++) {
      for (var row = 0; row < GRID_SIZE; row++) {
        var cell = gridCells[col][row];
        if (!cell || cell.mat !== 11) continue;
        var shimmer = Math.sin(time * 0.002 + col * 0.7 + row * 0.5) * 15;
        var base = hexToRgb(MATERIAL_COLORS.Water);
        var elevNorm = (cell.elev - minElev) / elevRange;
        var shade = 0.7 + elevNorm * 0.6;
        var r = Math.min(255, Math.max(0, Math.round(base.r * shade + shimmer)));
        var g = Math.min(255, Math.max(0, Math.round(base.g * shade + shimmer * 0.5)));
        var b = Math.min(255, Math.max(0, Math.round(base.b * shade + shimmer * 0.3)));
        ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
        ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
      }
    }
  }

  // -- Grid --
  if (layers.grid) {
    ctx.strokeStyle = 'rgba(212,167,98,0.12)';
    ctx.lineWidth = 0.5;
    for (var gi = 0; gi <= GRID_SIZE; gi++) {
      ctx.beginPath();
      ctx.moveTo(gi * CELL_SIZE, 0);
      ctx.lineTo(gi * CELL_SIZE, MAP_PX);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, gi * CELL_SIZE);
      ctx.lineTo(MAP_PX, gi * CELL_SIZE);
      ctx.stroke();
    }
  }

  // -- Rocks --
  if (layers.rocks) drawRocks(ctx);

  // -- Trees --
  if (layers.trees) drawTrees(ctx);

  // -- Vegetation --
  if (layers.vegetation) drawVegetation(ctx);

  // -- Labels --
  if (layers.labels) drawLabels(ctx);

  ctx.restore();

  // -- Cursor crosshair (screen space) --
  if (mouseWorldX >= 0 && mouseWorldX < MAP_PX && mouseWorldZ >= 0 && mouseWorldZ < MAP_PX) {
    var sp = worldToScreen(mouseWorldX, mouseWorldZ);
    ctx.strokeStyle = 'rgba(212,167,98,0.4)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(sp.x, 0); ctx.lineTo(sp.x, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, sp.y); ctx.lineTo(W, sp.y); ctx.stroke();
    ctx.setLineDash([]);
  }

  requestAnimationFrame(drawFrame);
}

// =====================================================================
//  INTERACTION — MOUSE
// =====================================================================

canvas.addEventListener('mousedown', function(e) {
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  camStartX = camX;
  camStartY = camY;
  canvas.classList.add('dragging');
});

window.addEventListener('mousemove', function(e) {
  if (dragging) {
    camX = camStartX + (e.clientX - dragStartX);
    camY = camStartY + (e.clientY - dragStartY);
  }
  var w = screenToWorld(e.clientX, e.clientY);
  mouseWorldX = w.x;
  mouseWorldZ = w.z;
  updateStats();
});

window.addEventListener('mouseup', function() {
  dragging = false;
  canvas.classList.remove('dragging');
});

// =====================================================================
//  INTERACTION — TOUCH
// =====================================================================

var touchStartX = 0, touchStartY = 0, touchCamX = 0, touchCamY = 0;
var lastTouchDist = 0, pinchZoomStart = 1;

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchCamX = camX;
    touchCamY = camY;
  } else if (e.touches.length === 2) {
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx * dx + dy * dy);
    pinchZoomStart = zoom;
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    camX = touchCamX + (e.touches[0].clientX - touchStartX);
    camY = touchCamY + (e.touches[0].clientY - touchStartY);
  } else if (e.touches.length === 2) {
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    var newZoom = Math.max(0.3, Math.min(8, pinchZoomStart * (dist / lastTouchDist)));
    var wBefore = screenToWorld(midX, midY);
    zoom = newZoom;
    var wAfter = screenToWorld(midX, midY);
    camX += (wAfter.x - wBefore.x) * zoom;
    camY += (wAfter.z - wBefore.z) * zoom;
    document.getElementById('zoomLevel').textContent = zoom.toFixed(1) + 'x';
  }
}, { passive: false });

// =====================================================================
//  INTERACTION — SCROLL ZOOM
// =====================================================================

canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  var zoomFactor = e.deltaY < 0 ? 1.12 : 0.89;
  var newZoom = Math.max(0.3, Math.min(8, zoom * zoomFactor));
  // Zoom toward cursor
  var wBefore = screenToWorld(e.clientX, e.clientY);
  zoom = newZoom;
  var wAfter = screenToWorld(e.clientX, e.clientY);
  camX += (wAfter.x - wBefore.x) * zoom;
  camY += (wAfter.z - wBefore.z) * zoom;
  document.getElementById('zoomLevel').textContent = zoom.toFixed(1) + 'x';
}, { passive: false });

// =====================================================================
//  LAYER TOGGLES
// =====================================================================

var checkboxes = document.querySelectorAll('#layerPanel input[type="checkbox"]');
for (var cbi = 0; cbi < checkboxes.length; cbi++) {
  (function(cb) {
    cb.addEventListener('change', function() {
      layers[cb.dataset.layer] = cb.checked;
      if (cb.dataset.layer === 'terrain') terrainDirty = true;
    });
  })(checkboxes[cbi]);
}

// =====================================================================
//  STATS UPDATE
// =====================================================================

function updateStats() {
  var posEl = document.getElementById('cursorPos');
  var matEl = document.getElementById('cursorMat');
  var elevEl = document.getElementById('cursorElev');

  if (mouseWorldX < 0 || mouseWorldX >= MAP_PX || mouseWorldZ < 0 || mouseWorldZ >= MAP_PX) {
    posEl.textContent = '\u2014';
    matEl.textContent = '\u2014';
    elevEl.textContent = '\u2014';
    return;
  }

  posEl.textContent = Math.round(mouseWorldX) + ', ' + Math.round(mouseWorldZ);

  var cell = getCellAt(mouseWorldX, mouseWorldZ);
  if (cell) {
    matEl.textContent = MATERIAL_NAMES[cell.mat];
    elevEl.textContent = cell.elev + ' studs';
  } else {
    matEl.textContent = '\u2014';
    elevEl.textContent = '\u2014';
  }
}

// =====================================================================
//  LEGEND
// =====================================================================

(function buildLegend() {
  var el = document.getElementById('legend');
  var shown = ['Sandstone','Ground','Grass','LeafyGrass','Water','Rock','Basalt','Slate','Cobblestone','Snow','Ice'];
  for (var li = 0; li < shown.length; li++) {
    var name = shown[li];
    var row = document.createElement('div');
    row.className = 'row';
    var swatch = document.createElement('div');
    swatch.className = 'swatch';
    swatch.style.background = MATERIAL_COLORS[name];
    var label = document.createElement('span');
    label.textContent = name;
    row.appendChild(swatch);
    row.appendChild(label);
    el.appendChild(row);
  }
})();

// =====================================================================
//  EXPORT PNG
// =====================================================================

function exportPNG() {
  var expCanvas = document.createElement('canvas');
  var scale = 2;
  expCanvas.width = MAP_PX * scale;
  expCanvas.height = MAP_PX * scale;
  var ec = expCanvas.getContext('2d');
  ec.scale(scale, scale);

  // Background
  ec.fillStyle = '#0d0d0d';
  ec.fillRect(0, 0, MAP_PX, MAP_PX);

  // Terrain
  if (terrainDirty) buildTerrainCache();
  ec.drawImage(terrainCache, 0, 0);

  // Water (static for export)
  for (var col = 0; col < GRID_SIZE; col++) {
    for (var row = 0; row < GRID_SIZE; row++) {
      var cell = gridCells[col][row];
      if (!cell || cell.mat !== 11) continue;
      var base = hexToRgb(MATERIAL_COLORS.Water);
      var elevNorm = (cell.elev - minElev) / elevRange;
      var shade = 0.7 + elevNorm * 0.6;
      ec.fillStyle = 'rgb(' + Math.round(base.r * shade) + ',' + Math.round(base.g * shade) + ',' + Math.round(base.b * shade) + ')';
      ec.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
    }
  }

  // Elements
  drawRocks(ec);
  drawTrees(ec);
  drawVegetation(ec);
  drawLabels(ec);

  // Title watermark
  ec.textAlign = 'center';
  ec.font = 'bold 24px Rye, Georgia, serif';
  ec.fillStyle = 'rgba(0,0,0,0.6)';
  ec.fillText('DUSTHAVEN', MAP_PX / 2 + 1, 31);
  ec.fillStyle = '#d4a762';
  ec.fillText('DUSTHAVEN', MAP_PX / 2, 30);
  ec.font = 'italic 12px Georgia, serif';
  ec.fillStyle = '#8a6e3a';
  ec.fillText('Zone 1 \u2014 Perdition Creek Valley', MAP_PX / 2, 48);

  var link = document.createElement('a');
  link.download = 'dusthaven-map.png';
  link.href = expCanvas.toDataURL('image/png');
  link.click();
}

// =====================================================================
//  MOBILE HAMBURGER
// =====================================================================

var mobileOpen = false;
function toggleMobile() {
  mobileOpen = !mobileOpen;
  document.getElementById('layerPanel').classList.toggle('open', mobileOpen);
  document.getElementById('legend').classList.toggle('open', mobileOpen);
}

// =====================================================================
//  START
// =====================================================================

requestAnimationFrame(drawFrame);
</script>
