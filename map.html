<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dusthaven — Zone 1 Map</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Lora:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d0d; font-family: 'Lora', Georgia, serif; color: #aa8855; }

canvas { display: block; width: 100%; height: 100%; cursor: grab; }
canvas.dragging { cursor: grabbing; }

#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 20;
  text-align: center; padding: 10px 16px 14px;
  background: linear-gradient(180deg, #0d0d0dee 0%, #0d0d0dcc 70%, transparent 100%);
  pointer-events: none;
}
#header h1 {
  font-family: 'Rye', Georgia, serif; font-size: 28px; color: #d4a762;
  text-shadow: 0 2px 8px #000, 0 0 20px #d4a76233; letter-spacing: 4px;
}
#header h2 {
  font-family: 'Lora', Georgia, serif; font-size: 13px; color: #8a6e3a;
  font-weight: normal; letter-spacing: 2px; font-style: italic; margin-top: 2px;
}

.panel {
  position: fixed; z-index: 30;
  background: #1a1008ee; border: 1px solid #3a2a15; border-radius: 8px;
  padding: 10px 12px; font-size: 11px; backdrop-filter: blur(6px);
}
.panel h3 {
  font-family: 'Rye', Georgia, serif; font-size: 11px; color: #d4a762;
  letter-spacing: 1px; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #3a2a1566;
}
.panel label {
  display: flex; align-items: center; gap: 6px; padding: 2px 0; cursor: pointer;
  color: #aa8855; transition: color 0.15s;
}
.panel label:hover { color: #d4a762; }
.panel input[type=checkbox] { accent-color: #d4a762; width: 13px; height: 13px; }

#layers { top: 70px; left: 12px; width: 160px; }

#legend {
  position: fixed; bottom: 12px; left: 12px; z-index: 30;
  background: #1a1008ee; border: 1px solid #3a2a15; border-radius: 8px;
  padding: 8px 12px; font-size: 10px; display: flex; gap: 8px; flex-wrap: wrap;
  backdrop-filter: blur(6px);
}
.legend-item { display: flex; align-items: center; gap: 4px; color: #aa8855; }
.legend-dot { width: 12px; height: 12px; border-radius: 2px; border: 1px solid #3a2a1555; }

#stats {
  position: fixed; bottom: 12px; right: 12px; z-index: 30;
  background: #1a1008ee; border: 1px solid #3a2a15; border-radius: 8px;
  padding: 8px 12px; font-size: 10px; color: #8a6e3a; text-align: right;
  backdrop-filter: blur(6px);
}

#export-btn {
  position: fixed; bottom: 50px; right: 12px; z-index: 30;
  background: linear-gradient(180deg, #5c4209, #3e2208); color: #d4a762;
  border: 1px solid #8a6e3a; border-radius: 4px; padding: 6px 14px;
  font-family: 'Rye', Georgia, serif; font-size: 10px; letter-spacing: 1px;
  cursor: pointer; text-transform: uppercase;
}
#export-btn:hover { background: linear-gradient(180deg, #6b4e0d, #5c4209); box-shadow: 0 0 12px #d4a76233; }

#loading {
  position: fixed; inset: 0; z-index: 100; background: #0d0d0d;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}
#loading h1 { font-family: 'Rye', Georgia, serif; font-size: 24px; color: #d4a762; letter-spacing: 3px; }
#loading p { color: #8a6e3a; font-size: 12px; margin-top: 8px; font-style: italic; }
#loading.hidden { display: none; }

@media (max-width: 768px) {
  #layers { display: none; }
  #legend { display: none; }
  #header h1 { font-size: 20px; }
}
</style>
</head>
<body>

<div id="loading"><h1>DUSTHAVEN</h1><p>Loading map...</p></div>

<div id="header">
  <h1>DUSTHAVEN</h1>
  <h2>Zone 1 &mdash; Perdition Creek Valley</h2>
</div>

<div class="panel" id="layers">
  <h3>LAYERS</h3>
  <label><input type="checkbox" id="lbl-labels" checked> Labels</label>
  <label><input type="checkbox" id="lbl-poi" checked> Points of Interest</label>
  <label><input type="checkbox" id="lbl-grid" > Grid</label>
  <label><input type="checkbox" id="lbl-coords" checked> Coordinates</label>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#C4A57B"></div>Sandstone</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4A90D9"></div>River</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6B6B6B"></div>Rock</div>
  <div class="legend-item"><div class="legend-dot" style="background:#E8E8F0"></div>Snow</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6B8E45"></div>Vegetation</div>
  <div class="legend-item"><div class="legend-dot" style="background:#9B8055"></div>Ground</div>
</div>

<div id="stats">
  <div id="stat-pos">X: — Z: —</div>
  <div id="stat-zoom">Zoom: 100%</div>
</div>

<button id="export-btn" onclick="exportPNG()">Export PNG</button>

<canvas id="map"></canvas>

<script>
const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');

// Map image
const mapImg = new Image();
const MAP_W = 1178;
const MAP_H = 1164;

// World coords: map covers X: 0-1024, Z: 0-1024
// Image pixel to world: worldX = (px / MAP_W) * 1024, worldZ = (py / MAP_H) * 1024
const WORLD_SIZE = 1024;

// Camera state
let camX = 0, camY = 0, zoom = 1;
let dragging = false, dragStartX = 0, dragStartY = 0, dragCamX = 0, dragCamY = 0;

// Layer toggles
const layers = {
  labels: true, poi: true, grid: false, coords: true
};

// Points of interest
const POI = [
  { x: 470, z: 420, label: "Cratere Central", icon: "crater", size: 140 },
  { x: 900, z: 920, label: "Montagne\nde Neige", icon: "mountain" },
  { x: 130, z: 200, label: "Riviere", icon: "water" },
  { x: 564, z: 296, label: "Spawn", icon: "spawn" },
  { x: 300, z: 80, label: "Plaine\nDesertique", icon: "desert" },
  { x: 550, z: 140, label: "Collines", icon: "hills" },
  { x: 350, z: 500, label: "Pont de\nPierre", icon: "bridge" },
  { x: 870, z: 380, label: "Marecage\nEst", icon: "swamp" },
  { x: 700, z: 700, label: "Foret\nSeche", icon: "forest" },
  { x: 470, z: 750, label: "Vallee\nSud", icon: "valley" },
];

// ─── Coordinate transforms ───
function worldToScreen(wx, wz) {
  const px = (wx / WORLD_SIZE) * MAP_W;
  const pz = (wz / WORLD_SIZE) * MAP_H;
  return {
    x: (px + camX) * zoom + canvas.width / 2,
    y: (pz + camY) * zoom + canvas.height / 2
  };
}

function screenToWorld(sx, sy) {
  const px = (sx - canvas.width / 2) / zoom - camX;
  const py = (sy - canvas.height / 2) / zoom - camY;
  return {
    x: (px / MAP_W) * WORLD_SIZE,
    z: (py / MAP_H) * WORLD_SIZE
  };
}

// ─── Resize ───
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
}

// ─── Draw ───
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!mapImg.complete) return;

  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(camX, camY);

  // Draw map image
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(mapImg, 0, 0, MAP_W, MAP_H);

  // Map border
  ctx.strokeStyle = '#3a2a15';
  ctx.lineWidth = 2 / zoom;
  ctx.strokeRect(0, 0, MAP_W, MAP_H);

  // Grid
  if (layers.grid) {
    ctx.strokeStyle = 'rgba(212,167,98,0.12)';
    ctx.lineWidth = 0.5 / zoom;
    const step = MAP_W / 8;
    for (let i = 1; i < 8; i++) {
      ctx.beginPath();
      ctx.moveTo(i * step, 0); ctx.lineTo(i * step, MAP_H);
      ctx.moveTo(0, i * step); ctx.lineTo(MAP_W, i * step);
      ctx.stroke();
    }
  }

  // Coordinate labels on edges
  if (layers.coords) {
    ctx.fillStyle = 'rgba(212,167,98,0.4)';
    ctx.font = `${Math.max(9, 11 / zoom)}px Georgia`;
    ctx.textAlign = 'center';
    for (let i = 0; i <= 8; i++) {
      const val = Math.round((i / 8) * WORLD_SIZE);
      const px = (i / 8) * MAP_W;
      const pz = (i / 8) * MAP_H;
      ctx.fillText(val, px, -4 / zoom);
      ctx.textAlign = 'right';
      ctx.fillText(val, -4 / zoom, pz + 4 / zoom);
      ctx.textAlign = 'center';
    }
  }

  // Labels & POI
  if (layers.labels || layers.poi) {
    for (const poi of POI) {
      const px = (poi.x / WORLD_SIZE) * MAP_W;
      const pz = (poi.z / WORLD_SIZE) * MAP_H;

      if (layers.poi) {
        // Draw marker
        const r = (poi.icon === 'spawn' ? 8 : 5) / zoom;

        if (poi.icon === 'spawn') {
          // Gold star
          drawStar(ctx, px, pz, r, 5, '#d4a762', zoom);
        } else if (poi.icon === 'crater') {
          // Dashed circle
          ctx.setLineDash([4 / zoom, 4 / zoom]);
          ctx.strokeStyle = 'rgba(212,167,98,0.5)';
          ctx.lineWidth = 1.5 / zoom;
          ctx.beginPath();
          ctx.arc(px, pz, (poi.size / WORLD_SIZE) * MAP_W / 2, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);
        } else {
          // Simple dot
          ctx.fillStyle = getIconColor(poi.icon);
          ctx.beginPath();
          ctx.arc(px, pz, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#0d0d0d88';
          ctx.lineWidth = 1 / zoom;
          ctx.stroke();
        }
      }

      if (layers.labels) {
        // Draw label
        const fontSize = Math.max(10, 13 / zoom);
        ctx.font = `600 ${fontSize}px 'Lora', Georgia`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const lines = poi.label.split('\n');
        const labelY = pz + (poi.icon === 'crater' ? 0 : (poi.icon === 'spawn' ? -14 / zoom : 10 / zoom));

        for (let i = 0; i < lines.length; i++) {
          const ly = labelY + i * (fontSize + 2);
          // Shadow
          ctx.fillStyle = '#0d0d0d';
          ctx.fillText(lines[i], px + 1 / zoom, ly + 1 / zoom);
          ctx.fillText(lines[i], px - 1 / zoom, ly - 1 / zoom);
          ctx.fillText(lines[i], px + 1 / zoom, ly - 1 / zoom);
          ctx.fillText(lines[i], px - 1 / zoom, ly + 1 / zoom);
          // Text
          ctx.fillStyle = poi.icon === 'spawn' ? '#d4a762' : '#e8dcc8';
          ctx.fillText(lines[i], px, ly);
        }
      }
    }
  }

  ctx.restore();
}

function getIconColor(icon) {
  const colors = {
    water: '#4A90D9', mountain: '#E8E8F0', desert: '#C4A57B',
    hills: '#9B8055', bridge: '#8B7D6B', swamp: '#6B8E45',
    forest: '#4A7035', valley: '#aa8855'
  };
  return colors[icon] || '#d4a762';
}

function drawStar(ctx, cx, cy, r, points, color, zoom) {
  ctx.fillStyle = color;
  ctx.strokeStyle = '#0d0d0d';
  ctx.lineWidth = 1.5 / zoom;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (i * Math.PI) / points - Math.PI / 2;
    const radius = i % 2 === 0 ? r : r * 0.45;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

// ─── Input ───
canvas.addEventListener('mousedown', e => {
  dragging = true;
  canvas.classList.add('dragging');
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragCamX = camX; dragCamY = camY;
});

window.addEventListener('mousemove', e => {
  if (dragging) {
    camX = dragCamX + (e.clientX - dragStartX) / zoom;
    camY = dragCamY + (e.clientY - dragStartY) / zoom;
    draw();
  }

  // Update stats
  const world = screenToWorld(e.clientX, e.clientY);
  if (world.x >= 0 && world.x <= WORLD_SIZE && world.z >= 0 && world.z <= WORLD_SIZE) {
    document.getElementById('stat-pos').textContent = `X: ${Math.round(world.x)}  Z: ${Math.round(world.z)}`;
  } else {
    document.getElementById('stat-pos').textContent = 'X: —  Z: —';
  }
});

window.addEventListener('mouseup', () => {
  dragging = false;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY < 0 ? 1.12 : 0.89;
  const newZoom = Math.max(0.3, Math.min(8, zoom * zoomFactor));

  // Zoom toward cursor
  const wx = (e.clientX - canvas.width / 2) / zoom - camX;
  const wy = (e.clientY - canvas.height / 2) / zoom - camY;
  zoom = newZoom;
  camX = (e.clientX - canvas.width / 2) / zoom - wx;
  camY = (e.clientY - canvas.height / 2) / zoom - wy;

  document.getElementById('stat-zoom').textContent = `Zoom: ${Math.round(zoom * 100)}%`;
  draw();
}, { passive: false });

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    dragCamX = camX; dragCamY = camY;
  } else if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    camX = dragCamX + (e.touches[0].clientX - dragStartX) / zoom;
    camY = dragCamY + (e.touches[0].clientY - dragStartY) / zoom;
    draw();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    if (lastTouchDist > 0) {
      zoom = Math.max(0.3, Math.min(8, zoom * (dist / lastTouchDist)));
      draw();
    }
    lastTouchDist = dist;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', () => { dragging = false; lastTouchDist = 0; });

// Layer toggles
['labels', 'poi', 'grid', 'coords'].forEach(id => {
  const el = document.getElementById('lbl-' + id);
  if (el) el.addEventListener('change', () => { layers[id] = el.checked; draw(); });
});

// Export
function exportPNG() {
  const exp = document.createElement('canvas');
  const expW = MAP_W * 2;
  const expH = MAP_H * 2;
  exp.width = expW; exp.height = expH;
  const ectx = exp.getContext('2d');
  ectx.imageSmoothingEnabled = true;
  ectx.imageSmoothingQuality = 'high';
  ectx.drawImage(mapImg, 0, 0, expW, expH);

  // Title watermark
  ectx.fillStyle = 'rgba(0,0,0,0.5)';
  ectx.fillRect(0, 0, expW, 60);
  ectx.font = "bold 28px 'Rye', Georgia";
  ectx.fillStyle = '#d4a762';
  ectx.textAlign = 'center';
  ectx.fillText('DUSTHAVEN — Zone 1', expW / 2, 40);

  const a = document.createElement('a');
  a.download = 'dusthaven-zone1-map.png';
  a.href = exp.toDataURL('image/png');
  a.click();
}

// ─── Init ───
mapImg.onload = () => {
  document.getElementById('loading').classList.add('hidden');
  // Center map
  camX = -MAP_W / 2;
  camY = -MAP_H / 2;
  // Fit to screen
  zoom = Math.min(canvas.width / MAP_W, canvas.height / MAP_H) * 0.85;
  document.getElementById('stat-zoom').textContent = `Zoom: ${Math.round(zoom * 100)}%`;
  draw();
};
mapImg.onerror = () => {
  document.getElementById('loading').querySelector('p').textContent = 'Error loading map image';
};
mapImg.src = 'carte2d.png';

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
